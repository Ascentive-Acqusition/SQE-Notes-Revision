y judgment, arguing there is no real prospect of the claimant succeeding. The claimant argues there are genuine issues of fact to be tried. What is the test for summary judgment?", "options": ["The judge must decide if the claimant's case is weak", "The defendant must show the claimant has no real prospect of success", "The judge must assess the likelihood of either party winning at trial", "The judge must be satisfied there is no defence to the claimant's claim"], "correct": 1, "explanation": "For summary judgment under Civil Procedure Rules Part 24, the defendant must demonstrate that the claimant has no real prospect of success at trial and there are no other reasons why the case should proceed. The claimant must show genuine issues for trial to resist the application."}, {"mod": "dr", "q": "A claimant alleges fraud in a contract dispute. The defendant denies the fraud allegations. The claimant seeks to rely on the defendant's emails as evidence. The defendant claims the emails are protected by legal advice privilege. Can the claimant obtain the emails?", "options": ["No, privilege protects all communications with a solicitor", "Yes, emails can never be privileged if they relate to a transaction", "No, unless the defendant has waived privilege by disclosing the emails", "Yes, privilege does not apply to communications seeking advice to further a fraud"], "correct": 3, "explanation": "The crime-fraud exception to privilege removes protection from communications made in furtherance of a crime or fraud. If the claimant can show that the defendant sought legal advice to further the fraud, privilege is lost and the emails are disclosable."}, {"mod": "dr", "q": "In a civil claim, a witness provides a statement to the claimant's solicitor but later becomes unavailable for trial. The claimant seeks to rely on the statement as evidence. Is the statement admissible?", "options": ["Yes, statements given to solicitors are admissible", "No, hearsay is not admissible in civil proceedings", "Yes, if the witness is unavailable and the statement is reliable", "No, unless the defendant had notice of the witness's evidence"], "correct": 2, "explanation": "In civil proceedings, hearsay is admissible under the Civil Evidence Act 1995. A statement by an unavailable witness can be admitted if the court considers it just and reasonable to do so. Factors include reliability, the reason for unavailability, and whether the opposing party can test the evidence."}, {"mod": "dr", "q": "A claimant brings a claim that is allocated to the small claims track. The claimant obtains judgment for \u00a38,000. The claimant has incurred \u00a32,000 in legal fees. Can the claimant recover the legal costs?", "options": ["Yes, all reasonable costs are recoverable in small claims", "No, small claims costs are limited to fixed costs and disbursements", "Yes, but only if the claim is for a contractual breach", "No, legal costs are never awarded in small claims cases"], "correct": 1, "explanation": "In small claims (up to \u00a310,000), costs are limited to fixed costs, court fees, and certain disbursements. Legal representative costs are not recoverable unless the case involves a claim in fraud or dishonesty. The claimant can recover only fixed costs."}];

// ── PRACTICE EXAM ENGINE ──
let examState = null;
let examTimer = null;

function showExamPicker() {
  // Count MCQs per module
  const counts = {};
  MODULE_ORDER.forEach(k => { counts[k] = MCQ_BANK.filter(q => q.mod === k).length; });

  let modItems = '';
  MODULE_ORDER.forEach(k => {
    const meta = MODULE_META[k];
    modItems += `
      <label class="picker-mod" onclick="setTimeout(updatePickerBtn,10)">
        <input type="checkbox" value="${k}" class="picker-cb">
        <span class="pm-dot" style="background:${meta.color}"></span>
        <span class="pm-name">${meta.name}</span>
        <span class="pm-count">${counts[k]} Qs</span>
      </label>`;
  });

  const overlay = document.createElement('div');
  overlay.className = 'exam-picker-overlay';
  overlay.id = 'exam-picker-overlay';
  overlay.innerHTML = `
    <div class="exam-picker">
      <h2>CHOOSE YOUR SECTIONS</h2>
      <p class="picker-sub">Pick the modules you want to be tested on, or select all for a full mock exam</p>
      <div class="picker-modules">${modItems}</div>
      <div class="picker-actions">
        <button class="picker-select-all" onclick="toggleAllPicker()">Select All</button>
        <button class="picker-close" onclick="document.getElementById('exam-picker-overlay').remove()">Cancel</button>
        <button class="picker-go" id="picker-go-btn" disabled onclick="launchExamFromPicker()">START</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function toggleAllPicker() {
  const cbs = document.querySelectorAll('.picker-cb');
  const allChecked = [...cbs].every(c => c.checked);
  cbs.forEach(c => { c.checked = !allChecked; c.closest('.picker-mod').classList.toggle('selected', !allChecked); });
  updatePickerBtn();
}

function updatePickerBtn() {
  const cbs = document.querySelectorAll('.picker-cb');
  const checked = [...cbs].filter(c => c.checked);
  const btn = document.getElementById('picker-go-btn');
  // Update label styling
  cbs.forEach(c => c.closest('.picker-mod').classList.toggle('selected', c.checked));
  const total = checked.reduce((sum, c) => sum + MCQ_BANK.filter(q => q.mod === c.value).length, 0);
  if (checked.length === 0) {
    btn.disabled = true;
    btn.textContent = 'START';
  } else {
    btn.disabled = false;
    btn.textContent = `START (${total} QUESTIONS)`;
  }
}

function launchExamFromPicker() {
  const selected = [...document.querySelectorAll('.picker-cb:checked')].map(c => c.value);
  document.getElementById('exam-picker-overlay').remove();

  let questions = MCQ_BANK.filter(q => selected.includes(q.mod));
  // Shuffle
  for (let i = questions.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [questions[i], questions[j]] = [questions[j], questions[i]];
  }
  // Scale timer: 1.7 min per question
  const timeLimit = Math.round(questions.length * 1.7 * 60 * 1000);
  examState = { questions, current: 0, answers: [], startTime: Date.now(), timeLimit };
  showExamQuestion();
  examTimer = setInterval(updateExamTimer, 1000);
}

function updateExamTimer() {
  if (!examState) return;
  const elapsed = Date.now() - examState.startTime;
  const remaining = Math.max(0, examState.timeLimit - elapsed);
  const m = Math.floor(remaining / 60000);
  const s = Math.floor((remaining % 60000) / 1000);
  const timerEl = document.getElementById('exam-timer');
  if (timerEl) timerEl.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  if (remaining <= 0) endExam();
}

function showExamQuestion() {
  const q = examState.questions[examState.current];
  const meta = MODULE_META[q.mod];
  const letters = ['A','B','C','D'];
  const overlay = document.createElement('div');
  overlay.className = 'exam-overlay';
  overlay.id = 'exam-overlay';
  overlay.innerHTML = `
    <div class="exam-top">
      <h2>PRACTICE EXAM</h2>
      <span class="exam-progress">Question ${examState.current + 1} of ${examState.questions.length}</span>
      <span class="exam-timer" id="exam-timer">02:33:00</span>
      <button class="exam-quit-btn" onclick="endExam()">End Exam</button>
    </div>
    <div class="exam-body">
      <div class="exam-card">
        <div class="exam-mod-label" style="background:${meta.color}">${meta.short}</div>
        <div class="exam-question">${q.q}</div>
        ${q.options.map((opt, i) => `
          <div class="exam-option" data-idx="${i}" onclick="pickExamAnswer(this, ${i}, ${q.correct})">
            <span class="opt-letter">${letters[i]}</span>
            <span>${opt}</span>
          </div>`).join('')}
        <div class="exam-explanation" id="exam-explanation">${q.explanation}</div>
        <button class="exam-next-btn" id="exam-next-btn" onclick="nextExamQuestion()">
          ${examState.current < examState.questions.length - 1 ? 'Next Question' : 'See Results'}
        </button>
      </div>
    </div>`;
  // Remove old overlay if exists
  const old = document.getElementById('exam-overlay');
  if (old) old.remove();
  document.body.appendChild(overlay);
}

function pickExamAnswer(el, picked, correct) {
  const card = el.closest('.exam-card');
  const options = card.querySelectorAll('.exam-option');
  options.forEach(o => o.classList.add('disabled'));
  el.classList.add('selected');
  if (picked === correct) {
    el.classList.add('correct');
    examState.answers.push({ mod: examState.questions[examState.current].mod, correct: true });
  } else {
    el.classList.add('wrong');
    options[correct].classList.add('correct');
    examState.answers.push({ mod: examState.questions[examState.current].mod, correct: false });
  }
  card.querySelector('.exam-explanation').classList.add('show');
  card.querySelector('.exam-next-btn').classList.add('show');
}

function nextExamQuestion() {
  examState.current++;
  if (examState.current >= examState.questions.length) {
    endExam();
  } else {
    showExamQuestion();
    updateExamTimer();
  }
}

function endExam() {
  clearInterval(examTimer);
  const overlay = document.getElementById('exam-overlay');
  if (!overlay) return;
  const total = examState.answers.length;
  const correct = examState.answers.filter(a => a.correct).length;
  const pct = total > 0 ? Math.round((correct / total) * 100) : 0;
  const passClass = pct >= 60 ? 'pass' : 'fail';

  // Breakdown by module
  const breakdown = {};
  MODULE_ORDER.forEach(k => { breakdown[k] = { total: 0, correct: 0 }; });
  examState.answers.forEach(a => { breakdown[a.mod].total++; if (a.correct) breakdown[a.mod].correct++; });

  let bdRows = '';
  MODULE_ORDER.forEach(k => {
    const b = breakdown[k];
    if (b.total === 0) return;
    const meta = MODULE_META[k];
    const bPct = Math.round((b.correct / b.total) * 100);
    bdRows += `<div class="bd-row">
      <span class="bd-label">${meta.short}</span>
      <div class="bd-bar-wrap"><div class="bd-bar" style="width:${bPct}%;background:${meta.color}"></div></div>
      <span class="bd-score">${b.correct}/${b.total}</span>
    </div>`;
  });

  overlay.innerHTML = `
    <div class="exam-top">
      <h2>RESULTS</h2>
      <button class="exam-quit-btn" onclick="document.getElementById('exam-overlay').remove()">Close</button>
    </div>
    <div class="exam-body">
      <div class="exam-results">
        <h2>${pct >= 60 ? 'AMAZING WORK ANNA' : 'KEEP GOING ANNA'}</h2>
        <p style="color:var(--text-light)">You answered ${total} question${total!==1?'s':''}</p>
        <div class="score-big ${passClass}">${pct}%</div>
        <p style="color:var(--text-light)">${correct} out of ${total} correct</p>
        <div class="breakdown">${bdRows}</div>
        <button class="result-btn" onclick="document.getElementById('exam-overlay').remove()">Back to Revision</button>
      </div>
    </div>`;
  examState = null;
}

// ── CONFIDENCE TRACKER ──
const confidence = {};

function markConfidence(modKey, chKey, qIdx, status) {
  const k = `${modKey}-${chKey}-${qIdx}`;
  confidence[k] = status;
  // Update button states
  const card = event.target.closest('.quiz-card');
  if (card) {
    card.querySelectorAll('.conf-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
  }
}

function getConfidenceStats() {
  const stats = {};
  MODULE_ORDER.forEach(k => { stats[k] = { got: 0, review: 0, total: 0 }; });
  Object.entries(confidence).forEach(([key, val]) => {
    const mod = key.split('-')[0];
    if (stats[mod]) {
      stats[mod].total++;
      if (val === 'got') stats[mod].got++;
      else stats[mod].review++;
    }
  });
  return stats;
}

// ── POMODORO TIMER ──
let pomoState = { running: false, mode: 'focus', remaining: 25 * 60, interval: null };

function initPomodoro() {
  const float = document.createElement('div');
  float.className = 'pomo-float';
  float.innerHTML = `
    <div class="pomo-panel" id="pomo-panel">
      <h3>POMODORO</h3>
      <div class="pomo-status" id="pomo-status">FOCUS TIME</div>
      <div class="pomo-time focus" id="pomo-time">25:00</div>
      <div class="pomo-btns">
        <button class="pomo-btn primary" id="pomo-start" onclick="togglePomo()">Start</button>
        <button class="pomo-btn" onclick="resetPomo()">Reset</button>
      </div>
    </div>
    <button class="pomo-toggle" id="pomo-toggle" onclick="document.getElementById('pomo-panel').classList.toggle('open')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    </button>`;
  document.body.appendChild(float);
}

function togglePomo() {
  if (pomoState.running) {
    clearInterval(pomoState.interval);
    pomoState.running = false;
    document.getElementById('pomo-start').textContent = 'Start';
    document.getElementById('pomo-toggle').classList.remove('ringing');
  } else {
    pomoState.running = true;
    document.getElementById('pomo-start').textContent = 'Pause';
    document.getElementById('pomo-toggle').classList.remove('ringing');
    pomoState.interval = setInterval(() => {
      pomoState.remaining--;
      updatePomoDisplay();
      if (pomoState.remaining <= 0) {
        clearInterval(pomoState.interval);
        pomoState.running = false;
        document.getElementById('pomo-start').textContent = 'Start';
        document.getElementById('pomo-toggle').classList.add('ringing');
        // Switch modes
        if (pomoState.mode === 'focus') {
          pomoState.mode = 'break';
          pomoState.remaining = 5 * 60;
          document.getElementById('pomo-status').textContent = 'BREAK TIME';
          document.getElementById('pomo-time').className = 'pomo-time break-time';
        } else {
          pomoState.mode = 'focus';
          pomoState.remaining = 25 * 60;
          document.getElementById('pomo-status').textContent = 'FOCUS TIME';
          document.getElementById('pomo-time').className = 'pomo-time focus';
        }
        updatePomoDisplay();
      }
    }, 1000);
  }
}

function resetPomo() {
  clearInterval(pomoState.interval);
  pomoState.running = false;
  pomoState.mode = 'focus';
  pomoState.remaining = 25 * 60;
  document.getElementById('pomo-start').textContent = 'Start';
  document.getElementById('pomo-status').textContent = 'FOCUS TIME';
  document.getElementById('pomo-time').className = 'pomo-time focus';
  document.getElementById('pomo-toggle').classList.remove('ringing');
  updatePomoDisplay();
}

function updatePomoDisplay() {
  const m = Math.floor(pomoState.remaining / 60);
  const s = pomoState.remaining % 60;
  document.getElementById('pomo-time').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

</script>
