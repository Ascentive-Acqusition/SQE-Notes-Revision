<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQE1 Revision</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #FAFAF8;
  --card: #FFFFFF;
  --accent: #C084A0;
  --sage: #7C9E8A;
  --purple: #9B8BBF;
  --warm: #D4A574;
  --border: #E8E3DC;
  --text: #2D2926;
  --text-light: #6B6560;
  --sidebar-w: 260px;
  --nav-h: 60px;
}

html { scroll-behavior: smooth; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ── TOP NAV ── */
.top-nav {
  position: fixed; top: 0; left: 0; right: 0; height: var(--nav-h);
  background: var(--card); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 24px; z-index: 1000;
  box-shadow: 0 1px 3px rgba(0,0,0,.04);
}
.nav-logo {
  font-family: 'Bebas Neue', sans-serif; font-size: 28px;
  color: var(--accent); letter-spacing: 2px; cursor: pointer;
  margin-right: 32px; user-select: none;
}
.nav-modules { display: flex; gap: 4px; overflow-x: auto; flex: 1; }
.nav-modules::-webkit-scrollbar { height: 0; }
.nav-btn {
  font-family: 'Bebas Neue', sans-serif; font-size: 15px;
  letter-spacing: 1px; padding: 8px 14px; border: none;
  background: transparent; color: var(--text-light); cursor: pointer;
  border-radius: 6px; white-space: nowrap; transition: all .2s;
}
.nav-btn:hover { background: rgba(192,132,160,.08); color: var(--text); }
.nav-btn.active { background: rgba(192,132,160,.12); color: var(--accent); }
.hamburger {
  display: none; background: none; border: none; cursor: pointer;
  width: 36px; height: 36px; flex-shrink: 0; margin-right: 12px;
}
.hamburger span {
  display: block; width: 22px; height: 2px; background: var(--text);
  margin: 5px auto; border-radius: 2px; transition: .3s;
}

/* ── SIDEBAR ── */
.sidebar {
  position: fixed; top: var(--nav-h); left: 0; bottom: 0;
  width: var(--sidebar-w); background: var(--card);
  border-right: 1px solid var(--border); overflow-y: auto;
  padding: 16px 0; z-index: 900; transition: transform .3s ease;
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.sidebar-section { margin-bottom: 4px; }
.sidebar-section-header {
  font-family: 'Bebas Neue', sans-serif; font-size: 14px;
  letter-spacing: 1.5px; color: var(--text-light);
  padding: 10px 20px; cursor: pointer; display: flex;
  align-items: center; justify-content: space-between;
  transition: background .2s; user-select: none;
}
.sidebar-section-header:hover { background: rgba(0,0,0,.02); }
.sidebar-section-header .arrow { font-size: 10px; transition: transform .2s; }
.sidebar-section-header.open .arrow { transform: rotate(90deg); }
.sidebar-chapters { display: none; padding: 0 0 8px 0; }
.sidebar-chapters.open { display: block; }
.sidebar-ch-link {
  display: block; padding: 7px 20px 7px 32px; font-size: 13px;
  color: var(--text-light); text-decoration: none; cursor: pointer;
  transition: all .15s; border-left: 3px solid transparent;
}
.sidebar-ch-link:hover { background: rgba(192,132,160,.06); color: var(--text); }
.sidebar-ch-link.active { border-left-color: var(--accent); color: var(--accent); font-weight: 500; }
.sidebar-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.3);
  z-index: 899;
}

/* ── MAIN ── */
.main {
  margin-left: var(--sidebar-w); margin-top: var(--nav-h);
  padding: 32px 40px 80px;
  min-height: calc(100vh - var(--nav-h));
}

/* ── AURA ANIMATION ── */
@keyframes aura-pulse {
  0%, 100% { transform: scale(1); opacity: .7; }
  50% { transform: scale(1.15); opacity: 1; }
}
@keyframes aura-rotate {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* ── HOME LAYOUT ── */
.home-top-row {
  display: grid; grid-template-columns: 1fr 380px; gap: 28px;
  max-width: 1200px; margin: 0 auto 36px; align-items: start;
}
@media (max-width: 900px) {
  .home-top-row { grid-template-columns: 1fr; }
}

/* ── MOTIVATION CARD ── */
.motivation-card {
  background: var(--card);
  border: 1px solid var(--border); border-radius: 16px;
  padding: 32px 36px; text-align: left; position: relative; overflow: hidden;
  box-shadow: 0 2px 12px rgba(192,132,160,.06);
}
.motivation-card::before {
  content: ''; position: absolute; top: -60px; right: -60px;
  width: 160px; height: 160px; border-radius: 50%;
  background: radial-gradient(circle, rgba(255,140,100,.12), rgba(233,130,200,.08), transparent 70%);
  animation: aura-pulse 5s ease-in-out infinite;
}
.motivation-card::after {
  content: ''; position: absolute; bottom: -40px; left: -40px;
  width: 120px; height: 120px; border-radius: 50%;
  background: radial-gradient(circle, rgba(255,180,80,.1), rgba(192,132,160,.06), transparent 70%);
  animation: aura-pulse 6s ease-in-out infinite 1s;
}
.motivation-card .greeting {
  font-family: 'Bebas Neue', sans-serif; font-size: 28px;
  letter-spacing: 1.5px; color: var(--accent); margin-bottom: 14px;
}
.motivation-card p {
  font-size: 14.5px; line-height: 1.75; color: var(--text); margin-bottom: 12px;
  position: relative; z-index: 1;
}
.motivation-card p:last-child { margin-bottom: 0; }
.motivation-card .sign-off {
  font-style: italic; color: var(--sage); font-weight: 500; margin-top: 16px;
}

/* ── TEST TIME PANEL ── */
.test-time-panel {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; overflow: hidden; position: relative;
  box-shadow: 0 2px 12px rgba(155,139,191,.06);
}
.test-time-header {
  position: relative; padding: 22px 24px 18px; text-align: center;
  overflow: hidden;
}
.test-time-aura {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  pointer-events: none;
}
.test-time-aura .aura-blob {
  position: absolute; border-radius: 50%; filter: blur(30px);
  animation: aura-pulse 4s ease-in-out infinite;
}
.test-time-aura .blob-1 {
  width: 120px; height: 120px;
  background: radial-gradient(circle, rgba(255,100,80,.35), rgba(255,160,60,.25), transparent 70%);
  top: -20px; left: 50%; transform: translateX(-50%);
}
.test-time-aura .blob-2 {
  width: 100px; height: 100px;
  background: radial-gradient(circle, rgba(240,120,200,.3), rgba(200,100,220,.2), transparent 70%);
  top: -10px; left: 20%; animation-delay: 1.5s;
}
.test-time-aura .blob-3 {
  width: 90px; height: 90px;
  background: radial-gradient(circle, rgba(255,200,60,.3), rgba(255,160,80,.2), transparent 70%);
  top: -10px; right: 15%; animation-delay: 3s;
}
.test-time-header h2 {
  font-family: 'Bebas Neue', sans-serif; font-size: 24px;
  letter-spacing: 3px; color: var(--text); position: relative; z-index: 1;
}
.test-time-header .subtitle {
  font-size: 12px; color: var(--text-light); position: relative; z-index: 1; margin-top: 2px;
}
.test-time-scroll {
  height: 420px; overflow-y: auto; padding: 4px 16px 16px;
}
.test-time-scroll::-webkit-scrollbar { width: 4px; }
.test-time-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.tt-module-label {
  font-family: 'Bebas Neue', sans-serif; font-size: 11px;
  letter-spacing: 1.5px; color: white; display: inline-block;
  padding: 2px 8px; border-radius: 10px; margin: 14px 0 6px;
}
.tt-module-label:first-child { margin-top: 4px; }
.tt-card {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; margin-bottom: 8px; overflow: hidden;
  cursor: pointer; transition: all .2s;
}
.tt-card:hover { border-color: var(--accent); box-shadow: 0 2px 8px rgba(192,132,160,.08); }
.tt-card-q {
  padding: 10px 14px; font-size: 12.5px; line-height: 1.5;
  display: flex; gap: 8px; align-items: flex-start;
}
.tt-card-q .tt-num {
  flex-shrink: 0; width: 20px; height: 20px; border-radius: 50%;
  font-size: 10px; font-weight: 700; color: white;
  display: flex; align-items: center; justify-content: center; margin-top: 1px;
}
.tt-card-a {
  max-height: 0; overflow: hidden; transition: max-height .35s ease, padding .25s;
  font-size: 12px; line-height: 1.6; color: var(--text);
  border-left: 3px solid var(--sage); margin: 0 14px;
  background: rgba(124,158,138,.04);
}
.tt-card-a.open {
  max-height: 400px; padding: 10px 12px; margin-bottom: 10px;
  border-radius: 0 6px 6px 0;
}
.tt-card-a .tt-a-label {
  font-family: 'Bebas Neue', sans-serif; font-size: 10px;
  letter-spacing: 1px; color: var(--sage); margin-bottom: 3px;
}
@media (max-width: 900px) {
  .test-time-scroll { height: 320px; }
}

/* ── HOME PAGE ── */
.home-hero {
  text-align: center; padding: 48px 0 40px;
}
.home-hero h1 {
  font-family: 'Bebas Neue', sans-serif; font-size: 48px;
  letter-spacing: 4px; color: var(--accent);
}
.home-hero p { color: var(--text-light); margin-top: 8px; font-size: 16px; }
.module-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px; max-width: 1200px; margin: 0 auto;
}
.module-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 24px; cursor: pointer;
  transition: all .25s; position: relative; overflow: hidden;
}
.module-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(0,0,0,.06);
}
.module-card-badge {
  display: inline-block; padding: 3px 10px; border-radius: 20px;
  font-family: 'Bebas Neue', sans-serif; font-size: 12px;
  letter-spacing: 1px; color: white; margin-bottom: 12px;
}
.module-card h3 {
  font-family: 'Bebas Neue', sans-serif; font-size: 22px;
  letter-spacing: 1px; margin-bottom: 6px;
}
.module-card p { font-size: 13px; color: var(--text-light); margin-bottom: 12px; line-height: 1.5; }
.module-card .ch-count {
  font-size: 12px; font-weight: 600; color: var(--text-light);
  border-top: 1px solid var(--border); padding-top: 12px; margin-top: 4px;
}

/* ── MODULE PAGE ── */
.module-header {
  padding: 32px 0 24px; border-bottom: 1px solid var(--border); margin-bottom: 32px;
}
.module-header h1 {
  font-family: 'Bebas Neue', sans-serif; font-size: 36px;
  letter-spacing: 2px;
}
.module-header p { color: var(--text-light); margin-top: 4px; }

/* ── CHAPTER CARD ── */
.chapter-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; margin-bottom: 28px;
  box-shadow: 0 1px 4px rgba(0,0,0,.03);
  overflow: hidden;
}
.chapter-card-header {
  padding: 20px 24px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
}
.chapter-card-header .ch-num {
  font-family: 'Bebas Neue', sans-serif; font-size: 14px;
  letter-spacing: 1px; padding: 4px 10px; border-radius: 6px;
  color: white;
}
.chapter-card-header h2 {
  font-family: 'Bebas Neue', sans-serif; font-size: 22px;
  letter-spacing: 1px;
}

/* ── TABS ── */
.tab-bar {
  display: flex; border-bottom: 1px solid var(--border);
  padding: 0 24px; background: rgba(250,250,248,.5);
}
.tab-btn {
  padding: 12px 20px; font-size: 13px; font-weight: 600;
  color: var(--text-light); background: none; border: none;
  cursor: pointer; position: relative; transition: color .2s;
  letter-spacing: .5px;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--accent); }
.tab-btn.active::after {
  content: ''; position: absolute; bottom: -1px; left: 12px; right: 12px;
  height: 2px; background: var(--accent); border-radius: 2px;
}
.tab-content { display: none; padding: 24px; }
.tab-content.active { display: block; }

/* ── NOTES STYLES ── */
.tab-content h3 {
  font-family: 'Bebas Neue', sans-serif; font-size: 18px;
  letter-spacing: 1px; margin: 20px 0 10px; padding-bottom: 6px;
  border-bottom: 1px solid var(--border); color: var(--text);
}
.tab-content h3:first-child { margin-top: 0; }
.tab-content ul {
  margin: 8px 0 16px 20px; list-style: none;
}
.tab-content ul li {
  position: relative; padding: 4px 0 4px 16px; font-size: 14px;
  line-height: 1.65;
}
.tab-content ul li::before {
  content: ''; position: absolute; left: 0; top: 12px;
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--accent); opacity: .5;
}
.callout {
  background: linear-gradient(135deg, rgba(192,132,160,.06), rgba(155,139,191,.06));
  border-left: 3px solid var(--accent); padding: 14px 18px;
  border-radius: 0 8px 8px 0; margin: 16px 0; font-size: 14px;
  line-height: 1.65;
}

/* ── FLOWCHART ── */
.flowchart {
  display: flex; flex-direction: column; align-items: center;
  gap: 0; padding: 20px 10px; overflow-x: auto;
}
.flow-start, .flow-step, .flow-decision {
  padding: 12px 24px; text-align: center; font-size: 13px;
  font-weight: 500; max-width: 300px; position: relative;
}
.flow-start {
  background: var(--accent); color: white; border-radius: 30px;
  padding: 10px 28px;
}
.flow-step {
  background: var(--card); border: 2px solid var(--border);
  border-radius: 8px;
}
.flow-decision {
  background: var(--card); border: 2px solid var(--accent);
  border-radius: 8px; transform: rotate(0deg);
  clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
  padding: 28px 32px; min-width: 200px; min-height: 90px;
  display: flex; align-items: center; justify-content: center;
}
.flow-arrow {
  display: flex; flex-direction: column; align-items: center;
  color: var(--text-light); font-size: 11px; padding: 4px 0;
}
.flow-arrow::before {
  content: ''; width: 2px; height: 20px; background: var(--border);
}
.flow-arrow::after {
  content: '▼'; font-size: 8px; color: var(--border); margin-top: -2px;
}
.flow-branch {
  display: flex; gap: 40px; justify-content: center; width: 100%;
  position: relative; padding-top: 12px;
}
.flow-branch > div {
  display: flex; flex-direction: column; align-items: center; flex: 1; max-width: 300px;
}
.flow-branch-label {
  font-family: 'Bebas Neue', sans-serif; font-size: 13px;
  letter-spacing: 1px; padding: 4px 12px; border-radius: 12px;
  margin-bottom: 8px;
}
.flow-branch-label.yes { background: rgba(124,158,138,.15); color: var(--sage); }
.flow-branch-label.no { background: rgba(192,132,160,.15); color: var(--accent); }

/* ── COMPARE TABLE ── */
.compare-table {
  width: 100%; border-collapse: collapse; font-size: 13px;
}
.compare-table thead th {
  background: var(--text); color: white; padding: 12px 16px;
  text-align: left; font-family: 'Bebas Neue', sans-serif;
  font-size: 14px; letter-spacing: 1px;
  position: sticky; top: 0;
}
.compare-table tbody tr:nth-child(even) { background: rgba(232,227,220,.2); }
.compare-table tbody td {
  padding: 10px 16px; border-bottom: 1px solid var(--border);
  vertical-align: top; line-height: 1.55;
}
.compare-table tbody tr:hover { background: rgba(192,132,160,.04); }

/* ── QUIZ ── */
.quiz-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; margin-bottom: 14px; overflow: hidden;
  cursor: pointer; transition: box-shadow .2s;
}
.quiz-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.05); }
.quiz-q {
  padding: 16px 20px; font-size: 14px; font-weight: 500;
  display: flex; align-items: flex-start; gap: 12px;
}
.quiz-q .q-icon {
  flex-shrink: 0; width: 24px; height: 24px; border-radius: 50%;
  background: var(--accent); color: white; display: flex;
  align-items: center; justify-content: center; font-size: 12px;
  font-weight: 700;
}
.quiz-a {
  max-height: 0; overflow: hidden; transition: max-height .4s ease, padding .3s;
  border-left: 3px solid var(--sage); margin: 0 20px;
  font-size: 14px; line-height: 1.65; color: var(--text);
  background: rgba(124,158,138,.04);
}
.quiz-a.open {
  max-height: 500px; padding: 14px 18px; margin-bottom: 16px;
  border-radius: 0 8px 8px 0;
}
.quiz-a .a-label {
  font-family: 'Bebas Neue', sans-serif; font-size: 12px;
  letter-spacing: 1px; color: var(--sage); margin-bottom: 4px;
}

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  .hamburger { display: flex; flex-direction: column; justify-content: center; }
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay.open { display: block; }
  .main { margin-left: 0; padding: 20px 16px 60px; }
  .nav-modules { display: none; }
  .module-grid { grid-template-columns: 1fr; }
  .home-hero h1 { font-size: 36px; }
  .tab-btn { padding: 10px 12px; font-size: 12px; }
  .flow-branch { flex-direction: column; gap: 12px; }
  .compare-table { font-size: 12px; }
  .compare-table thead th, .compare-table tbody td { padding: 8px 10px; }
}

/* ── PRACTICE EXAM ── */
.exam-overlay {
  position: fixed; inset: 0; background: var(--bg); z-index: 2000;
  display: flex; flex-direction: column; overflow: hidden;
}
.exam-top {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 28px; background: var(--card); border-bottom: 1px solid var(--border);
}
.exam-top h2 {
  font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 2px;
}
.exam-timer {
  font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px;
  color: var(--accent);
}
.exam-progress { font-size: 13px; color: var(--text-light); }
.exam-quit-btn {
  padding: 8px 18px; border: 1px solid var(--border); border-radius: 8px;
  background: var(--card); font-size: 13px; cursor: pointer; color: var(--text);
  font-family: 'DM Sans', sans-serif; transition: all .2s;
}
.exam-quit-btn:hover { border-color: var(--accent); color: var(--accent); }
.exam-body {
  flex: 1; overflow-y: auto; display: flex; justify-content: center;
  padding: 40px 24px;
}
.exam-card {
  max-width: 680px; width: 100%; background: var(--card);
  border: 1px solid var(--border); border-radius: 14px;
  padding: 32px; box-shadow: 0 2px 12px rgba(0,0,0,.04);
  align-self: flex-start;
}
.exam-card .exam-mod-label {
  display: inline-block; padding: 3px 10px; border-radius: 12px;
  font-family: 'Bebas Neue', sans-serif; font-size: 11px;
  letter-spacing: 1.5px; color: white; margin-bottom: 16px;
}
.exam-card .exam-question {
  font-size: 15px; line-height: 1.7; margin-bottom: 24px; font-weight: 500;
}
.exam-option {
  display: flex; align-items: flex-start; gap: 12px; padding: 14px 18px;
  border: 1.5px solid var(--border); border-radius: 10px; margin-bottom: 10px;
  cursor: pointer; transition: all .2s; font-size: 14px; line-height: 1.55;
}
.exam-option:hover { border-color: var(--accent); background: rgba(192,132,160,.03); }
.exam-option .opt-letter {
  flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
  background: var(--bg); display: flex; align-items: center;
  justify-content: center; font-weight: 700; font-size: 12px;
  border: 1.5px solid var(--border); transition: all .2s;
}
.exam-option.selected { border-color: var(--accent); background: rgba(192,132,160,.06); }
.exam-option.selected .opt-letter { background: var(--accent); color: white; border-color: var(--accent); }
.exam-option.correct { border-color: var(--sage); background: rgba(124,158,138,.08); }
.exam-option.correct .opt-letter { background: var(--sage); color: white; border-color: var(--sage); }
.exam-option.wrong { border-color: #D4726A; background: rgba(212,114,106,.06); }
.exam-option.wrong .opt-letter { background: #D4726A; color: white; border-color: #D4726A; }
.exam-option.disabled { pointer-events: none; }
.exam-explanation {
  display: none; margin-top: 20px; padding: 16px 18px;
  border-left: 3px solid var(--sage); background: rgba(124,158,138,.04);
  border-radius: 0 8px 8px 0; font-size: 13.5px; line-height: 1.65;
}
.exam-explanation.show { display: block; }
.exam-next-btn {
  display: none; margin-top: 20px; padding: 12px 32px;
  background: var(--accent); color: white; border: none;
  border-radius: 8px; font-size: 14px; font-weight: 600;
  cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all .2s;
}
.exam-next-btn.show { display: inline-block; }
.exam-next-btn:hover { opacity: .9; transform: translateY(-1px); }

/* ── EXAM RESULTS ── */
.exam-results {
  max-width: 600px; width: 100%; text-align: center; align-self: flex-start;
}
.exam-results h2 {
  font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 3px;
  margin-bottom: 8px;
}
.exam-results .score-big {
  font-family: 'Bebas Neue', sans-serif; font-size: 72px; letter-spacing: 2px;
  margin: 16px 0;
}
.exam-results .score-big.pass { color: var(--sage); }
.exam-results .score-big.fail { color: #D4726A; }
.exam-results .breakdown {
  text-align: left; margin-top: 28px; background: var(--card);
  border: 1px solid var(--border); border-radius: 12px; overflow: hidden;
}
.exam-results .bd-row {
  display: flex; align-items: center; padding: 10px 18px;
  border-bottom: 1px solid var(--border); font-size: 13px; gap: 12px;
}
.exam-results .bd-row:last-child { border-bottom: none; }
.exam-results .bd-label { flex: 1; font-weight: 500; }
.exam-results .bd-bar-wrap {
  flex: 2; height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden;
}
.exam-results .bd-bar {
  height: 100%; border-radius: 4px; transition: width .5s ease;
}
.exam-results .bd-score { width: 60px; text-align: right; font-weight: 600; }
.exam-results .result-btn {
  margin-top: 24px; padding: 14px 36px; background: var(--accent);
  color: white; border: none; border-radius: 8px; font-size: 15px;
  font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif;
}

/* ── START EXAM BUTTON ── */
.start-exam-btn {
  display: block; width: 100%; margin-top: 12px; padding: 14px;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  color: white; border: none; border-radius: 10px;
  font-family: 'Bebas Neue', sans-serif; font-size: 18px;
  letter-spacing: 2px; cursor: pointer; transition: all .2s;
}
.start-exam-btn:hover { opacity: .9; transform: translateY(-1px); }

/* ── EXAM PICKER ── */
.exam-picker-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 2000;
  display: flex; align-items: center; justify-content: center; padding: 24px;
}
.exam-picker {
  background: var(--card); border-radius: 16px; padding: 32px;
  max-width: 520px; width: 100%; box-shadow: 0 8px 40px rgba(0,0,0,.12);
}
.exam-picker h2 {
  font-family: 'Bebas Neue', sans-serif; font-size: 26px;
  letter-spacing: 2px; margin-bottom: 4px;
}
.exam-picker .picker-sub {
  font-size: 13px; color: var(--text-light); margin-bottom: 20px;
}
.picker-modules { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
.picker-mod {
  display: flex; align-items: center; gap: 12px; padding: 12px 16px;
  border: 1.5px solid var(--border); border-radius: 10px; cursor: pointer;
  transition: all .2s; user-select: none;
}
.picker-mod:hover { border-color: var(--accent); }
.picker-mod.selected { border-color: var(--accent); background: rgba(192,132,160,.06); }
.picker-mod input[type="checkbox"] {
  accent-color: var(--accent); width: 18px; height: 18px; cursor: pointer; flex-shrink: 0;
}
.picker-mod .pm-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}
.picker-mod .pm-name { font-size: 14px; font-weight: 500; flex: 1; }
.picker-mod .pm-count { font-size: 12px; color: var(--text-light); }
.picker-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.picker-select-all {
  font-size: 12px; color: var(--accent); cursor: pointer; font-weight: 600;
  background: none; border: none; font-family: 'DM Sans', sans-serif;
}
.picker-select-all:hover { text-decoration: underline; }
.picker-go {
  flex: 1; padding: 14px; background: linear-gradient(135deg, var(--accent), var(--purple));
  color: white; border: none; border-radius: 10px;
  font-family: 'Bebas Neue', sans-serif; font-size: 18px;
  letter-spacing: 2px; cursor: pointer; transition: all .2s;
}
.picker-go:hover { opacity: .9; }
.picker-go:disabled { opacity: .4; cursor: not-allowed; }
.picker-close {
  padding: 14px 20px; background: none; border: 1.5px solid var(--border);
  border-radius: 10px; font-size: 13px; cursor: pointer; color: var(--text-light);
  font-family: 'DM Sans', sans-serif; transition: all .2s;
}
.picker-close:hover { border-color: var(--text); color: var(--text); }

/* ── CONFIDENCE TRACKER ── */
.confidence-btns {
  display: none; gap: 8px; margin-top: 12px; padding-top: 12px;
  border-top: 1px solid var(--border);
}
.confidence-btns.show { display: flex; }
.conf-btn {
  padding: 6px 16px; border-radius: 20px; font-size: 12px;
  font-weight: 600; cursor: pointer; border: 1.5px solid; transition: all .2s;
  font-family: 'DM Sans', sans-serif;
}
.conf-btn.got-it { border-color: var(--sage); color: var(--sage); background: transparent; }
.conf-btn.got-it:hover, .conf-btn.got-it.active { background: var(--sage); color: white; }
.conf-btn.review { border-color: var(--accent); color: var(--accent); background: transparent; }
.conf-btn.review:hover, .conf-btn.review.active { background: var(--accent); color: white; }
.progress-rings { display: flex; flex-wrap: wrap; gap: 16px; margin: 20px 0; }
.progress-ring-item { text-align: center; }
.progress-ring-item .ring-label {
  font-size: 11px; font-weight: 600; color: var(--text-light); margin-top: 6px;
}

/* ── POMODORO ── */
.pomo-float {
  position: fixed; bottom: 24px; right: 24px; z-index: 1100;
}
.pomo-toggle {
  width: 52px; height: 52px; border-radius: 50%;
  background: var(--card); border: 1.5px solid var(--border);
  box-shadow: 0 2px 12px rgba(0,0,0,.08); cursor: pointer;

  font-family: 'Bebas Neue', sans-serif; font-size: 16px;
  letter-spacing: 1.5px; color: var(--text-light); margin-bottom: 8px;
}

  font-family: 'Bebas Neue', sans-serif; font-size: 42px;
  letter-spacing: 2px; margin: 8px 0;

.pomo-time.focus { color: var(--accent); }
.pomo-time.break-time { color: var(--sage); }
.pomo-status {
  font-size: 11px; font-weight: 600; letter-spacing: 1px;
  text-transform: uppercase; color: var(--text-light); margin-bottom: 12px;
}
.pomo-btns { display: flex; gap: 8px; justify-content: center; }
.pomo-btn {
  padding: 7px 16px; border-radius: 8px; font-size: 12px;
  font-weight: 600; cursor: pointer; border: 1.5px solid var(--border);
  background: var(--card); color: var(--text); transition: all .2s;
  font-family: 'DM Sans', sans-serif;
}
.pomo-btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
.pomo-btn:hover { opacity: .85; }
@keyframes pomo-pulse { 0%,100%{box-shadow: 0 2px 12px rgba(0,0,0,.08)} 50%{box-shadow: 0 2px 20px rgba(192,132,160,.3)} }

        <ul>
            <li>An offer is a definite promise to be bound by specified terms if the offeree accepts</li>
            <li><strong>Gibson v Manchester City Council [1979]</strong>: Objective test applied - would reasonable person think offer was intended?</li>

            <li>Invitation to other party to make an offer; inviter is not bound to accept</li>

        <ul>
            <li>Acceptance is unconditional agreement to all terms of offer</li>
            <li>Must be communicated to offeror (Taylor v Laird [1856])</li>
            <li><strong>Entores v Miles Far East Corp [1955]</strong>: Contract formed when acceptance received, not sent</li>

            <li>Must be benefit to promisor AND/OR detriment to promisee (Dunlop v Selfridge [1915])</li>
            <li>Consideration can be act, forbearance, or promise</li>
            <li>Consideration must move from promisee (Privity of Contract doctrine)</li>
            <li>Consideration must not be past - must be given in exchange for promise (Eastwood v Kenyon [1840])</li>
            <li><strong>Lampleigh v Brathwait [1615]</strong>: Past consideration valid IF implicitly requested at time</li>

        <div class="callout"><strong>Postal Rule:</strong> Applies only when post was reasonably contemplated mode of acceptance; acceptance effective when posted</div>

<h3>Introduction to Negligence</h3>
<ul>
<li>Three elements required: duty of care, breach, and causation + damage</li>
<li>Must prove all elements on balance of probabilities in civil cases</li>
<li>Established through case law and statute</li>
</ul>

<h3>The Leading Authority: Donoghue v Stevenson</h3>
<ul>
<li><strong>Donoghue v Stevenson [1932] AC 562</strong> - foundational case establishing general duty of care</li>
<li>Facts: Ginger beer bottle containing decomposed snail; pursuer consumed and suffered gastroenteritis</li>
<li>Lord Atkin's "neighbour principle": duty owed to persons who are so closely affected by act/omission that reasonable person would contemplate as likely to be affected</li>
<li>Established negligence as standalone tort beyond contractual relationships</li>
<li>Created framework for determining duty of care in novel situations</li>
</ul>

<div class="callout"><strong>Key Rule:</strong> A person is owed a duty of care if they are a "neighbour" - someone the defendant could reasonably foresee would be affected by their conduct.</div>

<h3>Establishing Duty: The Caparo Test</h3>
<ul>
<li><strong>Caparo Industries plc v Dickman [1990] 2 AC 605</strong> - three-part test for determining duty of care</li>
<li>Test applies when duty not previously established:</li>
<li><strong>1. Foreseeability:</strong> Was damage reasonably foreseeable?</li>
<li><strong>2. Proximity:</strong> Is there sufficient relationship between claimant and defendant (legal, physical, circumstantial)?</li>
<li><strong>3. Fairness:</strong> Is it fair, just and reasonable to impose duty?</li>
<li>Court exercises policy discretion at stage 3</li>
<li>Does not apply to established categories of duty</li>
</ul>

<h3>Established Categories of Duty</h3>
<ul>
<li><strong>Manufacturers to end-users:</strong> <strong>Donoghue v Stevenson</strong> - duty owed despite lack of direct contractual relationship</li>
<li><strong>Professional advisers:</strong> <strong>Hedley Byrne & Co v Heller & Partners [1964]</strong> - solicitors, accountants, surveyors owe duty regarding professional advice</li>
<li><strong>Property owners/occupiers:</strong> <strong>Occupiers' Liability Act 1957</strong> and <strong>1984</strong> - duty to visitors and non-visitors</li>
<li><strong>Drivers:</strong> Clear duty to other road users and pedestrians</li>
<li><strong>Employers:</strong> Duty to employees (health and safety); <strong>Health and Safety at Work etc. Act 1974</strong></li>
<li><strong>Public authorities:</strong> Established duty in some contexts; policy immunity in others</li>
<li><strong>Defendants creating danger:</strong> Duty to take reasonable precautions</li>
</ul>

<h3>Extension to Novel Situations</h3>
<ul>
<li>Caparo test used for categories not yet recognized</li>
<li>Courts reluctant to impose new duties in novel circumstances (policy reasons)</li>
<li><strong>Murphy v Brentwood Ltd [1991]</strong> - limited duty of local authorities regarding negligent inspection</li>
<li>Need for incremental approach: courts extend duty cautiously through similar cases</li>
<li>Policy considerations: floodgates, insurance implications, burden on defendants</li>
</ul>

<div class="callout"><strong>Remember:</strong> Established categories do not need Caparo test - duty automatically owed. New situations require full Caparo analysis.</div>

        notes: `
<h3>What is a Breach?</h3>
<ul>
<li>Having established duty of care exists, must prove defendant failed to meet standard required</li>
<li>Breach = failure to exercise care that reasonable person would exercise</li>
<li>Objective standard: assessed from perspective of reasonable person, not actual defendant</li>
<li>Burden of proof: balance of probabilities in civil cases</li>
</ul>

<div class="callout"><strong>Key Rule:</strong> Breach occurs when defendant falls below the standard of care expected of a reasonable person in the defendant's position.</div>

<h3>The Bolam Test: Standard of Care</h3>
<ul>
<li><strong>Bolam v Friern Hospital Management Committee [1957]</strong> - established test for professional negligence</li>
<li>Standard: Did defendant act in accordance with practice accepted by responsible body of professional opinion?</li>
<li>If reasonable professional would have acted similarly, no breach despite bad outcome</li>
<li>Applies to doctors, solicitors, engineers, surveyors, and other professionals</li>
<li><strong>Bolitho v City and Hackney Health Authority [1998]</strong> - Bolam test requires professional opinion to be reasoned, not merely existent</li>
<li>Court can reject opinion if not logically defensible or based on mistaken assumption</li>
</ul>

<h3>Standard of Care: Factors</h3>
<ul>
<li><strong>Magnitude of Risk:</strong> Greater risk = higher standard of care required</li>
<li><strong>Likelihood of harm:</strong> <strong>Bolton v Stone [1951]</strong> - cricket ball injuries extremely rare; no breach despite possibility</li>
<li><strong>Severity of potential harm:</strong> Greater potential injury = higher care expected</li>
<li><strong>Cost of precautions:</strong> Court balances cost against benefit</li>
<li><strong>Practicability of precautions:</strong> Is remedy feasible and realistic?</li>
<li><strong>Social utility:</strong> Socially valuable activities may justify greater risk-taking</li>
<li><strong>Common practice:</strong> Conforming to industry standard is evidence of reasonable care (but not conclusive)</li>
</ul>

<h3>The Hand Formula (Cost-Benefit Analysis)</h3>
<ul>
<li>Implicit in English law: balance probability of harm (P), gravity of harm (L), and cost of precautions (C)</li>
<li>If C < (P × L), reasonable precautions required; failure = breach</li>
<li>If C > (P × L), no requirement to take precautions; no breach</li>

<ul>

<li>Professionals judged against responsible body of professional opinion</li>
<li>Existence of alternative approach by other professionals = no breach (Bolam)</li>
<li>But opinion must be rationally defensible (Bolitho)</li>
<li>Applied to: medical treatment, legal advice, architectural design, surveying</li>
<li>Not applied to: breach of pure contractual obligations</li>
</ul>

<h3>Private Nuisance: Definition</h3>
<ul>

<h3>What Constitutes Actionable Nuisance</h3>
<ul>

<h3>Definition and Purpose</h3>
<ul>
<li>Employer/principal liable for torts committed by employee/agent within scope of employment</li>

<h3>Requirements for Vicarious Liability</h3>
<ul>

<li><strong>2. Tort by employee:</strong> Employee must commit tort (negligence, assault, fraud, nuisance)</li>
<li><strong>3. Course of employment:</strong> Tort must occur within scope of employment (not on frolic of own)</li>

<h3>Joint Tenancy and Tenancy in Common</h3>
<ul>
<li><strong>Joint tenancy</strong>: Two or more owners hold one legal estate together; on death of one joint tenant, survivor takes whole (right of survivorship)</li>

<li><strong>Right to possession</strong>: Mortgagee can take possession of property even if mortgagor is not in default (but equity limits this)</li>

<li><strong>Right of appointment of receiver</strong>: Can appoint receiver to collect rents and profits</li>
<li>Right to improve security (register charges, increase charge value)</li>
</ul>

<h3>Mortgagor's Equity of Redemption</h3>
<ul>
<li>Mortgagor has absolute right to redeem (pay off loan) at any time before sale or foreclosure</li>
<li>Equity cannot be excluded; clog on equity of redemption is void (equity will not be tied up)</li>

<h3>Rights of Mortgagor</h3>
<ul>

<li>Right to occupy property if not in default</li>

<li>Right to apply for stay of execution if in financial difficulty</li>

<li><strong>Undue influence</strong>: Party procures execution of deed by improper pressure, threats, or abuse of relationship</li>

        <strong>Definition:</strong> Administration is a formal process allowing an insolvent company to be rescued, restructured, or wound up in an orderly manner with protection from creditors.

        <strong>Purpose:</strong>

            <li>Achieve better result for creditors than immediate liquidation</li>

        </ul>

        <strong>Process:</strong>
        <ul>
            <li>Company, directors, or creditors appoint administrator (Licensed Insolvency Practitioner)</li>
            <li>Administrator has court protection - creditors cannot sue or recover without permission</li>
            <li>Moratorium on creditor action (prevents individual creditors pursuing recovery)</li>
            <li>Administrator assumes control from directors</li>
        </ul>

        <strong>Administrator's powers:</strong>
        <ul>
            <li>Take control of company and all assets</li>
            <li>Manage business as going concern (rescue attempts)</li>
            <li>Sell business or assets as a whole</li>
            <li>Continue trading temporarily</li>
            <li>Disclaim unprofitable contracts and leases</li>
            <li>Carry on legal proceedings on company's behalf</li>
        </ul>

        <ul>

            <li>Creditors vote on proposals (simple majority by value)</li>

        <strong>Exit from administration:</strong>
        <ul>
            <li>If rescue successful: company exits administration and trades normally</li>
            <li>If restructured: company may be sold as going concern</li>
            <li>If no rescue possible: company moved into liquidation</li>

        <h3>Company Voluntary Arrangement (CVA)</h3>

        <strong>Definition:</strong> A CVA is a formal agreement between company and creditors to restructure debt and continue trading, avoiding formal insolvency procedures.

            <li>Directors propose CVA (arrangement with creditors)</li>
            <li>Proposed terms: payment plan, debt write-off, debt deferral, etc.</li>

        <h3>Overview of Wills</h3>
        <p>A will is a testamentary document that disposes of a person's property on death. It must comply with formal statutory requirements to be valid.</p>

        <h3>Statutory Requirements - Wills Act 1837 s.9</h3>
        <div class="callout">
        <strong>Section 9 requirements (as amended):</strong>
        <ul>
            <li><strong>In writing</strong> - Will must be in writing (includes print, handwriting, or other permanent form)</li>
            <li><strong>Signed by testator</strong> - The person making the will (testator) must sign it</li>
            <li><strong>Signature requirement detail</strong> - Must be intended by testator to give effect to will or appear to be intended to do so</li>
            <li><strong>In presence of witnesses</strong> - Signature must be made or acknowledged in presence of two witnesses (or more)</li>
            <li><strong>Witness requirements</strong> - Each witness must sign (or acknowledge signature) in presence of testator and each other witness</li>
            <li><strong>No witnessing requirement needed</strong> - Modern reforms allow will to be valid if signature appears to be intended to authenticate</li>
        </ul>
        </div>

        <h3>Testamentary Capacity</h3>
        <div class="callout">
        <strong>Definition:</strong> The legal and mental ability to make a valid will.

        <strong>Key case - Banks v Goodfellow [1870]:</strong>
        <ul>
            <li>Leading authority on testamentary capacity</li>
            <li>Test has four elements (cumulative):</li>
            <li>1. Must understand the nature of making a will</li>
            <li>2. Must know the extent of their property</li>
            <li>3. Must know the natural objects of their bounty (family members and dependents)</li>
            <li>4. Must understand the distribution plan and how will disposes of property</li>
        </ul>

        <strong>Time of assessment:</strong>
        <ul>
            <li>Capacity assessed at time of execution (when will is signed)</li>
            <li>Person may lack capacity at other times but still execute valid will if capable at execution</li>
        </ul>

        <strong>Specific issues affecting capacity:</strong>
        <ul>
            <li><strong>Dementia/Alzheimer's</strong> - Testator must understand nature of will and extent of property (may be incapable even if managing other affairs)</li>
            <li><strong>Delusions</strong> - If testator suffering delusions, must assess whether delusions affect relevant issues (if delusion unrelated to will, capacity unaffected)</li>
            <li><strong>Blindness/deafness</strong> - Not per se incapacity; testator must understand will despite disability</li>
            <li><strong>Drugs/alcohol</strong> - Testator must be capable of understanding will (temporary intoxication may affect capacity at execution)</li>
            <li><strong>Age</strong> - Must be 18 or over to make valid will</li>
        </ul>

        <strong>Burden of proof:</strong>
        <ul>
            <li>Presumption: testator had capacity unless challenger proves otherwise</li>
            <li>If suspicious circumstances (undue influence, unusual dispositions), burden shifts to propounder to prove capacity</li>
        </ul>
        </div>

        <h3>Knowledge and Approval</h3>
        <div class="callout">
        <strong>Doctrine:</strong> Testator must understand and approve the contents of the will.

        <strong>Requirements:</strong>
        <ul>
            <li>Testator must read or be informed of the contents of the will</li>
            <li>Testator must approve the dispositions (distributions of property)</li>
            <li>Testator must believe the document represents their true wishes</li>
        </ul>

        <strong>Presumption and proof:</strong>
        <ul>
            <li>If will is properly executed and testator appears to understand it, presumption of knowledge and approval</li>
            <li>Challenger must prove lack of knowledge and approval</li>
            <li>If suspicious circumstances (testator blind, illiterate, or undue influence suspected), burden shifts to propounder</li>
        </ul>

        <strong>Relevant cases:</strong>
        <ul>
            <li><strong>Re Fulton Deceased [1987]</strong> - Blind testator: court required evidence that testator knew contents (cannot assume blind person understands)</li>
            <li><strong>Re Mogridge Deceased [2009]</strong> - Testator must be aware of will's effect, not just signature</li>
        </ul>
        </div>

        <h3>Execution - Formal Requirements</h3>
        <div class="callout">
        <strong>Signature by testator:</strong>
        <ul>
            <li>Testator must sign (or initial, or mark) the will</li>
            <li>Signature must be intended to authenticate the document (give effect to the will)</li>
            <li>Position of signature usually end of document, but position not critical if intent clear</li>
        </ul>

        <strong>Presence of witnesses:</strong>

            <li>Two witnesses must be present when testator signs (or acknowledges signature)</li>
            <li>Witnesses must see testator sign (not merely hear about it)</li>
            <li>Witnesses must be present together (not separately)</li>

        <strong>Witness signature:</strong>
        <ul>
            <li>Each witness must sign (or acknowledge signature) in testator's presence and each other's presence</li>
            <li>Must be aware they are witnessing a will</li>
            <li>Order of witnessing not critical (both can sign together or separately if present)</li>
        </ul>

        <strong>Disqualification of witnesses:</strong>
        <ul>
            <li>Witness who is beneficiary under the will: gift to that witness is void (Wills Act 1837 s.15)</li>
            <li>Spouse of witness: has interest in estate, should not witness (though not automatic disqualification)</li>
            <li>Moral requirement: witnesses should be independent and disinterested</li>

        <strong>Alteration post-execution:</strong>

            <li>Court will be strict where formalities seriously breached</li>
            <li>Easier to dispense where minor defects (e.g., signature position)</li>
        </ul>
        </div>

        <h3>Methods of Revocation</h3>

        <h3>Family Provision - Overview</h3>
        <p>Family provision law allows certain dependents and family members to claim against a deceased's estate if they consider provision inadequate, even if excluded from will.</p>

        <h3>Inheritance (Provision for Family and Dependants) Act 1975</h3>
        <div class="callout">
        <strong>Purpose of Act:</strong>
        <ul>
            <li>Allows family members and dependents to apply to court for maintenance provision</li>
            <li>Overrides testator's wishes if provision is unreasonable in circumstances</li>
            <li>Based on testator's moral duty to provide for dependents</li>
            <li>Also applies to intestacies (court can reorder distribution)</li>
        </ul>

        <strong>Key principle:</strong>
        <ul>
            <li>Court has discretion to award provision for "reasonable financial needs"</li>
            <li>Not about fairness or equality, but about maintenance</li>
        </ul>
        </div>

        <h3>Categories of Applicants</h3>
        <div class="callout">
        <strong>Classes of person eligible to apply (s.1 Inheritance Act 1975):</strong>

        <strong>Class 1: Spouse or Civil Partner</strong>
        <ul>
            <li>Spouse or civil partner of deceased</li>
            <li>Must be married/partnered at time of death (not divorced)</li>
            <li>Can claim for reasonable financial needs (maintenance)</li>
            <li>Or can claim to place in same position as intestacy (if will less favorable)</li>
        </ul>

        <strong>Class 2: Former Spouse or Former Civil Partner</strong>
        <ul>
            <li>Only if has not remarried since divorce/dissolution</li>
            <li>If remarried, loses right to claim</li>
            <li>Must show reasonable financial needs for maintenance</li>
        </ul>

        <strong>Class 3: Children</strong>
        <ul>
            <li>Biological children (including illegitimate)</li>
            <li>Adopted children (once adopted)</li>
            <li>Stepchildren if treated as children of the family (requires evidence of family relationship)</li>
            <li>Under age 18 OR over 18 if training for profession/vocation</li>
            <li>Can claim for reasonable financial needs</li>
        </ul>

        <strong>Class 4: Other Children of the Family</strong>
        <ul>
            <li>Stepchildren or other children treated as part of family</li>
            <li>Must have been treated as child of family (actual relationship, not biological)</li>
            <li>Applies even if not step-relation (e.g., partner's child if treated as child of family)</li>
            <li>Same rights as Class 3 children</li>
        </ul>

        <strong>Class 5: Dependents</strong>
        <ul>
            <li>Person maintained by deceased before death (financially supported)</li>
            <li>Examples: elderly parents, disabled siblings, carers</li>
            <li>Must show they were wholly or partly maintained by deceased</li>
            <li>Depends on proving actual financial support before death</li>
        </ul>

        <strong>Class 6: Persons Cohabiting</strong>
        <ul>
            <li>Person who lived with deceased as husband/wife (not married/civil partnership)</li>
            <li>Must have cohabited for 2+ years immediately before death</li>
            <li>Added by Law Reform (Succession) Act 1995</li>
            <li>Same rights as spouses to claim maintenance or intestacy position</li>
        </ul>
        </div>

        <h3>Maintenance Standard</h3>
        <div class="callout">
        <strong>Definition of reasonable financial provision:</strong>
        <ul>
            <li>For most classes (spouses, children, dependents): reasonable provision for maintenance</li>
            <li>Maintenance = adequate provision for living expenses (not capital accumulation)</li>
            <li>Standard: what is necessary for continued reasonable living</li>
        </ul>

        <strong>Different standard for spouses/cohabitants:</strong>
        <ul>
            <li>Spouses/civil partners: can claim "reasonable provision" OR place in same position as intestacy (if will is less favorable)</li>
            <li>Cohabitants: limited to maintenance standard (not intestacy position)</li>
        </ul>

        <strong>Assessment of reasonableness:</strong>
        <ul>
            <li>Court considers: deceased's assets and liabilities</li>
            <li>Applicant's financial needs and resources</li>
            <li>Applicant's age, health, living standards before death</li>
            <li>Relationship with deceased</li>
            <li>Deceased's moral duty to applicant</li>
            <li>Other dependents' claims</li>
        </ul>
        </div>

        <h3>Factors for Court Consideration</h3>
        <div class="callout">
        <strong>Statutory factors (Schedule 1 Inheritance Act):</strong>
        <ul>
            <li><strong>Financial needs:</strong> Applicant's current and future financial needs, their financial position</li>
            <li><strong>Income and earning capacity:</strong> Ability to earn/work</li>
            <li><strong>Age and health:</strong> Young/old, health condition affecting earning ability</li>
            <li><strong>Living standards:</strong> Standard of living during deceased's lifetime (relevant for spouses/children)</li>
            <li><strong>Moral duty:</strong> Deceased's moral obligation to applicant (not legal duty, but moral)</li>
            <li><strong>Other claims:</strong> Competing claims from other dependents and beneficiaries</li>
            <li><strong>Conduct:</strong> Applicant's conduct towards deceased (bad conduct may reduce award)</li>
            <li><strong>Contribution:</strong> Contributions made by applicant to deceased's welfare (care, services)</li>
        </ul>

        <strong>Moral duty concept:</strong>
        <ul>
            <li>Not strict legal duty, but moral responsibility</li>
            <li>Court considers relationship, dependency, prior support, applicant's needs</li>
            <li>More likely where long-standing family/dependent relationship</li>
            <li>Less likely for estranged relatives or those with independent means</li>
        </ul>
        </div>

        <h3>Court Orders and Remedies</h3>
        <div class="callout">
        <strong>Types of orders court can make (s.2 Inheritance Act):</strong>
        <ul>
            <li><strong>Lump sum:</strong> One-off payment to applicant (most common)</li>
            <li><strong>Periodical payment:</strong> Regular payments (e.g., annual maintenance)</li>
            <li><strong>Transfer of property:</strong> Transfer real or personal property to applicant</li>
            <li><strong>Settlement:</strong> Create trust of property for applicant's benefit</li>
            <li><strong>Variation of will:</strong> Court can alter will provisions</li>
        </ul>

        <strong>Principles for ordering remedy:</strong>
        <ul>
            <li>Award must be such that applicant can support themselves reasonably</li>
            <li>Not to give windfall or capital enrichment (maintenance only)</li>
            <li>Must be fair to other beneficiaries</li>
            <li>Consider estate's size and likely liabilities</li>
        </ul>

        <strong>Typical awards:</strong>
        <ul>
            <li>Spouse: lump sum or periodical payments reflecting living standard</li>
            <li>Child: lump sum for education/training or period payments until independent</li>
            <li>Cohabitant: lump sum for maintenance needs</li>
            <li>Dependent: modest periodic payment for living expenses</li>
        </ul>
        </div>

        <h3>Procedure and Limitations</h3>
        <div class="callout">
        <strong>Time limit for application:</strong>
        <ul>
            <li>Application must be made within 6 months of grant of probate/administration</li>
            <li>Can be extended by court if applicant wasn't aware of death or grant</li>
            <li>Late application rare but possible on grounds of justice</li>
        </ul>

        <strong>Application procedure:</strong>
        <ul>
            <li>Apply to probate court or High Court (depending on estate size/complexity)</li>
            <li>Serve notice on executor/personal representatives</li>
            <li>Executor/beneficiaries can defend claim (contest award)</li>
            <li>Court hearing to determine reasonable provision and appropriate order</li>
        </ul>

        <strong>Effect of order:</strong>
        <ul>
            <li>Personal representatives must comply with court order</li>
            <li>May require estate assets to be retained pending order</li>
            <li>Can cause delay in beneficiary distributions</li>
        </ul>

        <strong>Illustration of claim:</strong>
        <ul>
            <li>Widow left modest legacy in will</li>
            <li>Has no income, needs maintenance for living expenses</li>
            <li>Estate substantial</li>
            <li>Court likely to award lump sum or periodic payment for maintenance (intestacy position may be reference point)</li>
        </ul>
        </div>

        <h3>Moral Duty Assessment</h3>
        <div class="callout">
        <strong>Key cases establishing moral duty:</strong>
        <ul>
            <li><strong>Re Goodchild [1997]</strong> - Court examined deceased's relationship with applicant and prior support. Stronger moral duty where long-standing dependency.</li>
            <li><strong>Re Hawkins [1972]</strong> - Testator's wishes not conclusive; court can override if applicant in financial need.</li>
        </ul>

        <strong>Factors supporting higher moral duty:</strong>
        <ul>
            <li>Long-standing dependency or family relationship</li>
            <li>Applicant gave care or services to deceased</li>
            <li>Applicant in poor financial position</li>
            <li>Deceased had promised provision (though not binding)</li>
        </ul>

        <strong>Factors reducing moral duty:</strong>
        <ul>
            <li>Estranged relationship</li>
            <li>Applicant self-sufficient and wealthy</li>
            <li>Applicant breached relationship or mistreated deceased</li>
            <li>Applicant has other sources of support</li>
        </ul>
        </div>

<ul>
<li><strong>Certainty of Intention:</strong> Settlor must intend to create a trust (not merely moral obligation). Objective test - words + conduct.</li>

<h3>Presumed Resulting Trusts</h3>

        notes: `<h3>Actus Reus (Guilty Act)</h3>
<ul>
<li><strong>Definition:</strong> The objective physical element of a crime - the act/omission itself</li>
<li><strong>Must Be:</strong>
  <ul>
  <li>VOLUNTARY - within defendant's control (R v Bratty - sleepwalking not voluntary)</li>
  <li>CAUSAL - must actually cause/contribute to prohibited result (R v Williams - omission causation hard to prove)</li>
  <li>CULPABLE - either act/omission defined as crime or statutory requirement</li>
  </ul>
</li>
<li><strong>Act vs. Omission:</strong> Generally NO liability for omission UNLESS:
  <ul>
  <li>Statute requires it (Health & Safety Act)</li>
  <li>Common law duty (parent to child, doctor to patient, lifeguard on duty)</li>
  <li>Special relationship (R v Stone & Dobinson - cohabitants had duty to vulnerable adult)</li>
  </ul>
</li>
<li><strong>State of Affairs:</strong> Some crimes punish state of affairs, not action (being in charge of vehicle while intoxicated)</li>
</ul>

<h3>Mens Rea (Guilty Mind)</h3>
<ul>
<li><strong>Definition:</strong> The mental element - defendant's intention/recklessness/knowledge</li>
<li><strong>Types:</strong>
  <ul>
  <li><strong>Intention:</strong> Direct intent (aim/purpose) or oblique intent (foreseen as virtually certain) (R v Woollin - virtual certainty test)</li>
  <li><strong>Recklessness:</strong> Defendant aware of risk + unjustifiably runs it (Cunningham test - subjective awareness of risk)</li>
  <li><strong>Negligence:</strong> Failure to foresee risk a reasonable person would see (objective test)</li>
  <li><strong>Knowledge/Willfulness:</strong> Knowing fact exists (e.g., knowing property belongs to another in theft)</li>
  </ul>
</li>
<li><strong>Correspondence Principle:</strong> Mens rea element must match actus reus element (R v Gemmell - subjective recklessness for criminal damage)</li>
</ul>

<h3>Coincidence Principle</h3>
<ul>
<li><strong>Rule:</strong> Actus reus + mens rea must COINCIDE in time (R v Thabo Meli)</li>
<li><strong>Problem:</strong> If mens rea formed after actus reus, or actus reus completed before mens rea, no crime</li>
<li><strong>Exception - Continuing Act:</strong> Where act is continuing (unlawful imprisonment, assault continuing), mens rea formed during continuance satisfies coincidence (R v Miller - fire case)</li>
<li><strong>Example:</strong> D strikes V, V falls, D leaves. If D forms intent to kill AFTER the strike, NO murder. BUT if act is continuing (V hanging), intent formed during continuance = murder possible.</li>
</ul>

<h3>Strict Liability Crimes</h3>
<ul>
<li><strong>Definition:</strong> Crimes where mens rea (intention/recklessness) NOT required for one/more actus reus elements</li>
<li><strong>Presumption:</strong> Mens rea presumed unless statute clearly removes it (R v Sweet v Parsley - drugs case)</li>
<li><strong>Common Areas:</strong>
  <ul>
  <li>Public welfare (food hygiene, environmental protection)</li>
  <li>Trading/commercial (selling underweight goods)</li>
  <li>Traffic (strict liability for excess speed in most cases)</li>
  </ul>
</li>
<li><strong>Defence - Mistake:</strong> Even innocent mistake may not be defence in strict liability (except honest/reasonable mistake of fact in some cases, R v Prince)</li>
<li><strong>Policy:</strong> Strict liability encourages due diligence in high-risk activities</li>
</ul>

<div class="callout">

<h3>Duress</h3>
<ul>
<li><strong>Definition:</strong> Defense when defendant commits crime under threat of death/GBH</li>
<li><strong>Threats:</strong> Death or serious bodily harm (not mere threats of property damage) (R v Valderrama-Vega)</li>

        <h3>Dispute Resolution Landscape</h3>
        <ul>
            <li><strong>Hierarchy:</strong> Negotiation → Mediation/Arbitration → Litigation (in Crown Courts/High Court)</li>
            <li><strong>Overarching Objective (CPR):</strong> Courts deal with cases justly and at proportionate cost</li>
            <li><strong>Pre-action protocols:</strong> Parties must attempt resolution before court proceedings commence</li>
            <li><strong>ADR encouraged:</strong> Courts strongly encourage alternative dispute resolution (Halsey v Milton Keynes)</li>
        </ul>

        <h3>Negotiation</h3>
        <ul>
            <li><strong>Direct negotiation:</strong> Parties/solicitors communicate to reach settlement</li>
            <li><strong>Without prejudice:</strong> Communications marked 'without prejudice' cannot be used in evidence</li>
            <li><strong>Costs benefit:</strong> Cheapest method; fastest if parties cooperative</li>
            <li><strong>Advantages:</strong> Confidential, flexible, preserves relationships, low cost</li>
            <li><strong>Disadvantages:</strong> Power imbalances, may fail if positions entrenched</li>
        </ul>

        <h3>Mediation</h3>
        <ul>
            <li><strong>Definition:</strong> Neutral third party (mediator) facilitates settlement between parties</li>
            <li><strong>Mediator role:</strong> Does not decide; assists parties to reach mutual agreement</li>
            <li><strong>Process:</strong> Joint session; separate meetings (shuttling); mediator proposes solutions</li>
            <li><strong>Confidentiality:</strong> Mediation communications confidential; cannot be disclosed in court</li>
            <li><strong>Success rate:</strong> High success rate (60-80%); parties must be willing to compromise</li>
            <li><strong>Costs:</strong> Mediator fees; but potentially lower than litigation</li>
        </ul>

        <h3>Arbitration</h3>
        <ul>
            <li><strong>Definition:</strong> Neutral arbitrator (chosen by parties) hears dispute and awards decision (arbitral award)</li>
            <li><strong>Arbitration agreement:</strong> Parties must agree to arbitrate (contract term or separate agreement)</li>
            <li><strong>Process:</strong> Similar to court trial; evidence, arguments, oral hearing</li>
            <li><strong>Award:</strong> Arbitrator's decision is final and binding; limited appeal rights</li>
            <li><strong>Advantages:</strong> Expert arbitrator, confidential, faster than court, final decision</li>
            <li><strong>Disadvantages:</strong> Cost, finality (limited appeals), less procedural safeguards</li>
        </ul>

        <h3>Litigation (Court-Based Dispute Resolution)</h3>
        <ul>
            <li><strong>Forum:</strong> County Courts (most civil cases); High Court (complex/precedent-setting)</li>
            <li><strong>Judge role:</strong> Judge applies law; decides case (no jury in civil cases)</li>
            <li><strong>Procedure:</strong> Governed by Civil Procedure Rules 2015; strict rules of evidence</li>
            <li><strong>Judgment:</strong> Binding judgment; can be enforced; full appeal rights</li>
            <li><strong>Advantages:</strong> Formal procedure, judicial impartiality, public precedent, enforcement mechanisms</li>
            <li><strong>Disadvantages:</strong> Cost, delay, formality, publicity, adversarial nature</li>
        </ul>

        <h3>Advantages and Disadvantages of ADR vs Litigation</h3>
        <ul>
            <li><strong>Cost:</strong> ADR typically cheaper (no discovery, shorter process); Litigation expensive (full discovery, length)</li>
            <li><strong>Speed:</strong> Mediation weeks/months; Litigation 1-2 years+</li>
            <li><strong>Confidentiality:</strong> ADR confidential; Litigation judgments public</li>
            <li><strong>Control:</strong> ADR parties control outcome; Litigation judge decides</li>
            <li><strong>Relationship:</strong> ADR preserves relationships; Litigation adversarial, damages relationships</li>
            <li><strong>Certainty:</strong> ADR agreement both parties accept; Litigation winner/loser, uncertainty until judgment</li>
        </ul>

        <h3>Court's Approach to ADR</h3>
        <ul>
            <li><strong>Halsey v Milton Keynes (2004):</strong> Courts encourage ADR; non-participation can be penalized in costs</li>
            <li><strong>Costs sanction:</strong> If party unreasonably refuses ADR, court may order to pay opponent's costs despite winning</li>

        </ul>

        <div class="callout">
            <strong>Key Rule:</strong> ADR is encouraged before litigation. Parties must attempt resolution (negotiation, mediation, arbitration). Unreasonable refusal to participate in ADR can result in costs sanctions even if litigation succeeds. Negotiation and mediation are cheap, fast, confidential alternatives to court.

function buildNavButtons() {
  MODULE_ORDER.forEach(key => {

    btn.className = 'nav-btn';
    btn.textContent = MODULE_META[key].short;
    btn.dataset.mod = key;
    btn.addEventListener('click', () => openModule(key));
    $navBtns.appendChild(btn);
  });
}

function buildSidebar() {
  $sidebar.innerHTML = '';
  MODULE_ORDER.forEach(key => {
    const meta = MODULE_META[key];
    const section = document.createElement('div');
    section.className = 'sidebar-section';
    const header = document.createElement('div');
    header.className = 'sidebar-section-header';
    header.innerHTML = `<span>${meta.short}</span><span class="arrow">▶</span>`;
    header.addEventListener('click', () => {
      header.classList.toggle('open');
      chapList.classList.toggle('open');
    });
    const chapList = document.createElement('div');
    chapList.className = 'sidebar-chapters';
    const chKeys = Object.keys(MODULE_DATA[key].chapters).map(Number).sort((a,b) => a-b);
    chKeys.forEach(ck => {
      const link = document.createElement('a');
      link.className = 'sidebar-ch-link';
      link.textContent = `Ch ${ck}: ${MODULE_DATA[key].chapters[ck].title}`;
      link.dataset.mod = key;
      link.dataset.ch = ck;
      link.addEventListener('click', () => {
        if (currentModule !== key) openModule(key, false);
        setTimeout(() => {
          const el = document.getElementById(`ch-${key}-${ck}`);
          if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, currentModule !== key ? 100 : 0);
        highlightSidebarLink(key, ck);
        closeSidebar();
      });
      chapList.appendChild(link);
    });
    section.appendChild(header);
    section.appendChild(chapList);
    $sidebar.appendChild(section);
  });
}

function highlightSidebarLink(modKey, chKey) {
  document.querySelectorAll('.sidebar-ch-link').forEach(l => l.classList.remove('active'));
  const link = document.querySelector(`.sidebar-ch-link[data-mod="${modKey}"][data-ch="${chKey}"]`);
  if (link) link.classList.add('active');
}

function setActiveNav(key) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

    const btn = document.querySelector(`.nav-btn[data-mod="${key}"]`);
    if (btn) btn.classList.add('active');
