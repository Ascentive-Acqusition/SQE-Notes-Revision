const MCQ_BANK = [{"mod": "con", "q": "Sarah offers to sell her car to Tom for \u00a35,000. Tom says he will think about it. The next day, Sarah sells the car to Jane. Tom then calls Sarah to accept her offer. Which of the following best describes the legal position?", "options": ["Tom's acceptance is valid and forms a binding contract with Sarah", "The offer was revoked by Sarah when she sold the car to Jane", "Tom's acceptance comes too late as the offer was revoked by Sarah's actions", "Tom can claim damages from Sarah for breach of the preliminary negotiations"], "correct": 2, "explanation": "An offer can be revoked by the offeror at any time before acceptance. Sarah's sale to Jane constitutes a clear revocation of her offer to Tom. Tom's subsequent acceptance cannot form a contract."}, {"mod": "con", "q": "A builder submits a quote to a homeowner stating 'This quote is valid for 7 days.' On day 6, the builder sends an email saying 'I've decided to increase the price by 10%.' The homeowner immediately emails back accepting the original quote. Is there a binding contract?", "options": ["Yes, because the homeowner accepted within the 7-day period", "No, because the builder revoked the offer before acceptance", "Yes, because prices cannot be unilaterally increased", "No, because quotes are not formal offers"], "correct": 1, "explanation": "The builder's email withdrawing the quote constitutes a valid revocation of the offer before the homeowner's acceptance. Even though it was within the 7-day window, revocation takes effect once communicated."}, {"mod": "con", "q": "Leo offers to buy Sarah's antique watch for \u00a3500, adding 'You have until Friday to decide.' On Wednesday, Leo reads in the newspaper that Sarah has sold the antique watch to someone else. Can Leo still revoke his offer?", "options": ["No, the offer is irrevocable because a time limit was specified", "Yes, Leo can revoke at any time before Sarah's acceptance", "No, once Sarah has sold the watch, the offer becomes binding", "Yes, but only if he can prove he read about the sale before Friday"], "correct": 1, "explanation": "Even when an offeror specifies a time limit, the offer remains revocable until acceptance. Leo can revoke at any point before Sarah accepts. The existence of a time limit does not make the offer irrevocable."}, {"mod": "con", "q": "A company advertises 'Laptops on sale for \u00a3299 while stocks last.' A customer goes to the shop and asks to buy the advertised laptop. The shopkeeper says they have sold out. Can the customer claim there is a binding contract?", "options": ["Yes, the advertisement is a contractual offer that must be honoured", "No, advertisements are mere invitations to treat, not offers", "Yes, because the wording 'while stocks last' implies acceptance of orders", "No, but the customer can claim damages for misrepresentation"], "correct": 1, "explanation": "Advertisements are generally invitations to treat, not binding offers. The company is inviting customers to make offers, which it can then accept or reject. The customer's request to purchase is the offer."}, {"mod": "con", "q": "Alex sends a fax offering to sell equipment for \u00a310,000, stating 'Please confirm acceptance by return fax by 5pm today.' Jamie receives the fax at 4:45pm but doesn't send a confirmation fax until 5:30pm. Is there a binding contract?", "options": ["Yes, because Jamie sent acceptance the same day", "No, because Jamie's acceptance arrived after the deadline", "Yes, because the deadline was merely indicative, not absolute", "No, unless Jamie can prove they received the fax by 5pm"], "correct": 1, "explanation": "A stipulated deadline for acceptance is binding. When an offeror specifies that acceptance must arrive by a certain time, acceptance that arrives after that time is ineffective, even if it was sent before the deadline."}, {"mod": "con", "q": "A car dealer displays a car with a price tag of \u00a38,000. A customer brings the car to the checkout and tenders \u00a38,000. The dealer says 'I'm sorry, the price has been reduced to \u00a37,500, you can buy at that price.' What is the legal position?", "options": ["The customer must pay \u00a38,000 as that was the displayed price", "The customer is not bound to buy at either price, as the display was an invitation to treat", "The dealer has made a unilateral contract that the customer can accept", "The customer is entitled to buy at \u00a38,000 due to consumer protection laws"], "correct": 1, "explanation": "The display of goods with prices is an invitation to treat. When a customer tenders payment, they make an offer to buy. The dealer is free to reject that offer. The displayed price does not bind the dealer."}, {"mod": "con", "q": "Ben orders a mobile phone online for \u00a3599. The website shows 'Order now - we reserve the right to reject orders.' The next day, the seller emails Ben saying they are unable to fulfil the order due to stock issues. Ben insists he has a binding contract. Is Ben correct?", "options": ["Yes, because his order was placed and payment processed", "No, the seller's acceptance of the order is the key moment, which has not occurred", "Yes, because consumer protection laws prevent sellers from rejecting orders", "No, but Ben can claim damages for breach of statutory duty"], "correct": 1, "explanation": "When a customer places an online order, they are making an offer. The seller's acceptance (typically by confirming the order) is required to form a binding contract. A seller's reservation of the right to reject orders reflects this principle."}, {"mod": "con", "q": "Charlotte sends an email to a supplier: 'Can you supply 100 widgets at \u00a35 each?' The supplier replies: 'Yes, we can supply 100 widgets at \u00a35 each. Delivery will be 2 weeks.' Charlotte doesn't respond for 3 weeks, then orders the widgets. Can Charlotte enforce the original quoted price?", "options": ["Yes, the supplier's email was an offer that remained open for reasonable time", "No, Charlotte's failure to respond meant the offer lapsed", "Yes, but only if Charlotte confirms acceptance within a reasonable time of order", "No, Charlotte's order was a new offer that the supplier can reject"], "correct": 1, "explanation": "An offer lapses after a reasonable time if no time limit is specified. After 3 weeks, the supplier's offer would have lapsed through effluxion of time. Charlotte's subsequent order is a new offer that the supplier need not accept at the old price."}, {"mod": "con", "q": "A contractor submits a tender for a construction project. After submitting the tender, the contractor discovers it contains a pricing error of \u00a350,000. Can the contractor withdraw the tender before the client accepts it?", "options": ["No, a tender cannot be withdrawn once submitted", "Yes, a tender is an offer and can be revoked before acceptance", "No, because the client may have already begun to rely on the tender", "Yes, but only if the error is obvious to a reasonable person"], "correct": 1, "explanation": "A tender is an offer and therefore can be revoked before acceptance by the client. The contractor has the right to revoke even if they discover an error, though the revocation must be communicated."}, {"mod": "con", "q": "David receives a letter offering to sell a property for \u00a3250,000, stating 'This offer remains open until I receive your written acceptance.' Two weeks later, David wants to accept but cannot find the letter. Can David still form a contract by making an oral acceptance?", "options": ["Yes, an oral acceptance is valid if it matches the written offer", "No, the offeror required acceptance in writing", "Yes, the method of acceptance can be changed by the acceptor", "No, because David has lost the legal right to accept after two weeks"], "correct": 1, "explanation": "When an offeror specifies a particular method of acceptance (here, written acceptance), the acceptor must comply with that method. Oral acceptance will not be effective, even if it otherwise communicates clear acceptance."}, {"mod": "con", "q": "Emma buys a ticket for a concert. The ticket states on the back: 'The organiser reserves the right to refuse entry to any person deemed disruptive.' Emma attends but is turned away. Can Emma claim she was wrongly refused entry?", "options": ["Yes, the organiser must provide a refund of the ticket price", "No, the terms on the ticket give the organiser absolute discretion", "Yes, the organiser must prove Emma is disruptive before refusing entry", "No, the organiser can refuse entry but must provide a full explanation"], "correct": 2, "explanation": "While standard terms may be incorporated into a contract, they must be applied reasonably and in good faith. An organiser cannot arbitrarily refuse entry; they must have a genuine reason based on the stated ground (disruptiveness). The term is a contractual right, not an absolute power."}, {"mod": "con", "q": "Frank orders goods from an online retailer. The website terms state 'Goods must be inspected within 24 hours of delivery or they are deemed accepted.' Frank receives the goods on Friday evening, works away, and inspects them on Monday. The retailer claims the goods are accepted. What is the legal position?", "options": ["The goods are accepted because more than 24 hours have passed", "The goods are not accepted if 24 hours is an unreasonable time frame under the Unfair Contract Terms Act", "Frank has waived his right to inspect by not inspecting within 24 hours", "The 24-hour term is void as it contradicts statutory protection"], "correct": 1, "explanation": "Under consumer protection law, contractual terms that deprive consumers of statutory rights (including inspection of goods) are subject to the unfairness test. A 24-hour inspection deadline may be unreasonable and unenforceable if it prevents Frank from exercising statutory rights."}, {"mod": "tort", "q": "A homeowner digs a trench in her back garden. She fails to fence the trench or put up warning signs. A neighbour's child, aged 4, wanders through a gap in the garden boundary and falls into the trench, suffering serious injuries. Can the homeowner be liable for negligence?", "options": ["No, the child was a trespasser so the homeowner owes no duty of care", "Yes, the homeowner owes a duty to prevent foreseeable harm to children", "No, the neighbour was negligent in allowing the child to wander", "Yes, but only if the homeowner knew children might access the garden"], "correct": 1, "explanation": "Occupiers can owe a duty of care to child trespassers. A hazard like an unfenced trench is an alluring danger that is foreseeable to attract children. The homeowner should take reasonable precautions against foreseeable harm to young children."}, {"mod": "tort", "q": "A pedestrian is hit by a car. The driver was speeding at 40mph in a 30mph zone. The pedestrian's injuries would have been exactly the same if the car had been travelling at 30mph. Can the pedestrian recover damages?", "options": ["Yes, because the driver was speeding and that caused the accident", "No, because the pedestrian has not proved that speeding caused the injury", "No, because the pedestrian's injuries would have been the same anyway", "Yes, unless the driver can prove the pedestrian was negligent"], "correct": 1, "explanation": "Causation requires that the negligent act was the material cause of the damage. Under the 'but for' test, but for the speeding, would the injury have occurred? Here, the injuries would have been identical, so the speeding did not cause the damage."}, {"mod": "tort", "q": "A surgeon operates on a patient under a general anaesthetic. During surgery, the patient suffers a heart attack unrelated to the surgery or the surgeon's actions. The patient dies. Is the surgeon liable for negligence?", "options": ["Yes, surgeons are strictly liable for patient deaths under their care", "No, if the heart attack was unforeseeable and unrelated to the surgery", "Yes, the surgeon should have anticipated the possibility of a heart attack", "No, because the patient consented to the risks of surgery"], "correct": 1, "explanation": "A completely unexpected and independent medical event that breaks the chain of causation may relieve the negligent party of liability. An unforeseeable heart attack, unrelated to the surgery or surgeon's actions, may break the chain of causation."}, {"mod": "tort", "q": "A council fails to maintain a public footpath properly, resulting in a pothole. A jogger steps into the pothole, injures her ankle, and falls. She then hits her head on a nearby fence and suffers a serious head injury. Can the council be liable for the head injury?", "options": ["No, the fence was the direct cause of the head injury", "No, the head injury is too remote a consequence of the pothole", "Yes, if the head injury was a reasonably foreseeable consequence of the initial fall", "Yes, because the council created a dangerous situation"], "correct": 2, "explanation": "Even if there is an intervening event (hitting the fence), it may not break the chain of causation if it is a reasonably foreseeable consequence of the original negligence. A fall from a pothole naturally leading to hitting nearby objects is reasonably foreseeable."}, {"mod": "tort", "q": "A tennis player is injured when hit by a ball during a casual game at the club. The player sues the club for negligence, alleging inadequate netting around the court. What would the club argue in its defence?", "options": ["The club is not liable for injuries caused by the game itself", "Volenti non fit injuria - the player accepted the risks inherent in tennis", "The player was negligent in not watching the ball", "Tennis clubs have absolute liability for player injuries"], "correct": 1, "explanation": "Volenti non fit injuria (consent to risk) is a defence where a claimant has voluntarily accepted the risk of the activity. A player participating in tennis accepts the ordinary risks of the sport, though not risks from the club's negligence in protecting spectators or in court maintenance."}, {"mod": "tort", "q": "A factory owner knows that toxic fumes are regularly escaping from the factory but takes no action. Residents living 100 metres away suffer headaches and respiratory problems. Can they recover damages in nuisance?", "options": ["No, the residents assumed the risk by living near a factory", "Yes, if the interference with their use and enjoyment of property is substantial", "No, unless the residents can prove direct physical damage to property", "Yes, if the factory owner intended to cause the harm"], "correct": 1, "explanation": "Private nuisance protects against unreasonable interference with the use and enjoyment of land. This includes indirect effects like fumes. The test is whether the interference is substantial and unreasonable. The factory owner's knowledge and failure to act supports liability."}, {"mod": "tort", "q": "A newspapers publishes an article claiming a businesswoman embezzled company funds. The businessman was acquitted in a criminal trial. Can she sue for defamation?", "options": ["No, because the claim was investigated by police", "No, because she was acquitted, so the statement was not false", "Yes, if the statement was false and caused damage to her reputation", "Yes, because defamation is strict liability regardless of truth"], "correct": 2, "explanation": "Defamation requires proof that the statement was false, published, caused damage to reputation, and was not protected by a defence. Acquittal in a criminal trial does not mean the statement is true; civil defamation uses the civil standard of proof, not criminal proof beyond reasonable doubt."}, {"mod": "tort", "q": "A social media user posts a comment saying 'I think the local council is corrupt' on a public forum. The council member sues for defamation. What is the user's best defence?", "options": ["Absolute privilege as a matter of public policy", "Qualified privilege, if the statement was made honestly and in good faith about a matter of public interest", "Truth, because the user genuinely believes the council is corrupt", "The statement is opinion, not fact, so it cannot be defamatory"], "correct": 1, "explanation": "Qualified privilege may apply to statements on matters of public interest made in good faith. However, truth is not proven by genuine belief alone; the statement must be provably true. Opinion defence requires the statement to be recognisable as opinion, not presented as fact."}, {"mod": "tort", "q": "A builder negligently installs wiring in a new house. The defect does not cause injury, but the house is worth \u00a350,000 less due to the cost of repairs. Can the buyer recover pure economic loss from the builder?", "options": ["Yes, because the builder's negligence caused the loss", "No, pure economic loss is not recoverable unless there is a special relationship", "Yes, because the builder had a professional duty to the buyer", "No, because the buyer's only remedy is breach of contract"], "correct": 2, "explanation": "Pure economic loss caused by negligence is generally not recoverable unless there is a special relationship (contractual, fiduciary, or close professional relationship) between the parties. Here, the builder may owe a special duty to the buyer regarding safety and quality."}, {"mod": "tort", "q": "A homeowner's tree drops a branch that damages a neighbour's car. The homeowner did not know the tree was diseased. Is the homeowner liable?", "options": ["No, the homeowner is not liable if they did not know of the danger", "Yes, homeowners are strictly liable for damage caused by their trees", "Yes, if the tree was of a type known to shed branches", "No, unless the homeowner was negligent in maintaining the tree"], "correct": 3, "explanation": "A homeowner owes a duty to take reasonable care regarding trees on their property. This includes being aware of obvious signs of disease or defect. The homeowner should take reasonable precautions to prevent foreseeable harm, such as inspecting and maintaining trees."}, {"mod": "tort", "q": "A police officer pursues a suspect at high speed through a residential area. The chase results in a crash injuring a innocent bystander. Can the bystander sue the police for negligence?", "options": ["No, because the police have absolute immunity in negligence", "Yes, the police owe a duty of care to all road users", "No, the suspect, not the police, caused the crash", "Yes, but the police can argue public policy and operational decisions justify the chase"], "correct": 3, "explanation": "Police do not have absolute immunity. However, operational decisions (like conducting a high-speed chase) may be protected from negligence liability if the conduct was justified in the circumstances and reasonable. Policy considerations apply to police negligence claims."}, {"mod": "tort", "q": "A surgeon operates on the wrong patient due to a hospital administration error. The patient is unharmed, but there is temporary distress. Can the patient recover damages?", "options": ["No, because no physical injury occurred", "Yes, for battery, as the patient did not consent to this procedure", "No, unless the patient can prove future harm will occur", "Yes, under negligence, regardless of physical injury"], "correct": 1, "explanation": "Operating on the wrong patient without consent is a battery (intentional trespass to the person), not merely negligence. Battery requires no proof of injury; it is actionable per se. The patient can recover damages for the battery, including any distress caused."}, {"mod": "land", "q": "A property is registered at the Land Registry with a standard restriction that requires the consent of a trust corporation before any disposition. The registered proprietor sells the property without obtaining this consent. Is the sale valid?", "options": ["Yes, the restriction does not affect the validity of the sale", "No, the restriction is a mandatory requirement and the sale is void", "Yes, if the buyer had no notice of the restriction", "No, the buyer must obtain the consent retrospectively to perfect the sale"], "correct": 2, "explanation": "A restriction registered at the Land Registry is a notice on the register that must be complied with. If a transaction is completed without complying with the restriction, the transaction is still valid but the registered proprietor is in breach of the restriction. The buyer takes the property subject to the restriction."}, {"mod": "land", "q": "A homeowner grants a 5-year tenancy to a tenant. After 3 years, the homeowner wants to recover possession but the tenant refuses to leave. What type of notice must the homeowner serve?", "options": ["A 7-day notice to quit", "A 4-week notice to quit, or one month's notice if later", "A 12-week notice to quit", "Notice is not required; the tenancy ends automatically after 5 years"], "correct": 1, "explanation": "For an assured shorthold tenancy, a landlord seeking possession during the tenancy must serve notice. The statutory notice period depends on the type of tenancy and ground for possession. For many grounds, a 4-week or one month's notice is required, though some grounds require longer notice."}, {"mod": "land", "q": "A landowner has unregistered land that was last transferred 15 years ago. The seller has lost the title deeds. Can the buyer obtain first registration at the Land Registry?", "options": ["No, without original title deeds, registration is impossible", "Yes, if the buyer has been in uninterrupted possession for 12 years", "Yes, the Land Registry can be satisfied by evidence of title if possession is clear", "No, the seller must obtain a possessory title first"], "correct": 2, "explanation": "For unregistered land, if the seller does not have full documentary evidence of title, they can apply for possessory title if they can show uninterrupted occupation. Alternatively, 12 years of uninterrupted occupation by the buyer may allow first registration with absolute title under adverse possession rules."}, {"mod": "land", "q": "A landlord and tenant have an oral arrangement for a 3-year tenancy of a flat. The tenant moves in and pays rent for 6 months, but no written lease is created. Is this an enforceable tenancy?", "options": ["No, a 3-year tenancy must be in writing to be enforceable", "Yes, the oral tenancy is binding between the parties", "No, a tenancy of any length must be created by deed", "Yes, but only if the tenant continues to pay rent for the full 3 years"], "correct": 0, "explanation": "Under the Law of Property Act 1925, section 54(2), a tenancy for more than 3 years must be created by deed (or at least in writing with agreed terms). An oral tenancy of 3 years is not enforceable. However, the tenant may have an equitable interest through part performance."}, {"mod": "land", "q": "A leaseholder has a 99-year lease that is now down to 50 years remaining. The leaseholder wants to extend the lease but the freeholder refuses. Can the leaseholder force the extension?", "options": ["No, the freeholder has the right to refuse any lease extension", "Yes, the leaseholder has a statutory right to extend the lease by 90 years", "Yes, if the leaseholder has owned the property for at least 2 years", "No, unless the leaseholder can prove hardship"], "correct": 1, "explanation": "Under the Leasehold Reform, Housing and Urban Development Act 1993, leaseholders have the statutory right to extend their lease by 90 years if they have owned it for at least 2 years and the lease is sufficiently short. This is a valuable right that cannot be refused by the freeholder."}, {"mod": "land", "q": "A neighbour has used a footpath across your land for 15 years without permission. The path is clearly defined and well-maintained. You want to prevent future use. What is the strongest legal position for the neighbour?", "options": ["The neighbour has no legal rights after 15 years of use", "The neighbour may have acquired a legal easement through 20 years of adverse possession", "The neighbour may claim a prescriptive easement after 20 years of continuous, open, and nonfurtive use", "The neighbour has only a temporary licence to use the path"], "correct": 2, "explanation": "A prescriptive easement can be acquired through 20 years of continuous use 'as of right' (without permission, openly, and without force). After 20 years, the neighbour could claim a legal easement. At 15 years, the neighbour has not yet acquired the easement but is close to doing so."}, {"mod": "land", "q": "A property is subject to a covenant requiring the owner to maintain a fence. The current owner has neglected the fence, and it is falling into disrepair. The neighbouring land is now owned by someone other than the original covenantee. Can the neighbour enforce the covenant?", "options": ["Yes, all restrictive covenants run with the land", "No, the covenant is purely personal and ended when the original neighbour sold the land", "Yes, if the neighbour can show the covenant benefits their land", "No, repairing covenants are always personal and cannot run with the land"], "correct": 2, "explanation": "For a covenant to benefit successor owners, the benefit must have passed to them. The benefit of a covenant passes if: (1) it touches and concerns the land, (2) the covenant was intended to benefit the land, and (3) the beneficiary took with the benefit. Repairing covenants can pass if they benefit the neighbouring land."}, {"mod": "land", "q": "A property in a conservation area is subject to an Article 4 Direction removing permitted development rights. The owner wants to erect a two-storey extension. What must the owner do?", "options": ["The owner needs only to apply for conservation area consent", "The owner must obtain full planning permission", "The owner has no right to build the extension in a conservation area", "The owner must notify the local authority but can proceed without permission"], "correct": 1, "explanation": "An Article 4 Direction removes permitted development rights. Without permitted development rights, the owner needs full planning permission for most works, including extensions. The conservation area and Article 4 Direction together mean planning control is required."}, {"mod": "blp", "q": "A solicitor is instructed to act for a buyer in a property purchase. The solicitor discovers that the seller's title has a defect that would affect the property's value, but the buyer fails to ask about it. Should the solicitor disclose the defect?", "options": ["No, the solicitor only acts for the buyer and owes no duty to the seller", "No, the solicitor has no duty to volunteer information about defects", "Yes, the solicitor must disclose the defect to the buyer", "Yes, the solicitor must inform both the buyer and the seller"], "correct": 2, "explanation": "A solicitor owes a duty to their client to provide all relevant information affecting the transaction. If the solicitor is aware of a defect in title that affects value, they must inform the buyer, their client, even if the buyer does not specifically ask."}, {"mod": "blp", "q": "A company director has a conflict of interest in a particular contract. The director discloses the interest at a board meeting and abstains from voting. Is this sufficient to remove the director's personal liability for breach of duty?", "options": ["Yes, disclosure and abstention fully protect the director from liability", "No, a director can never escape liability for conflicts of interest", "Yes, unless the board's decision was irrational or the conflict was undisclosed", "It depends on whether the contract was in the company's best interests"], "correct": 2, "explanation": "A director's disclosure and abstention from voting can protect them from liability for breach of the duty to avoid conflicts of interest, provided the disclosure is full and the director had not already received personal benefits from the conflict before disclosure."}, {"mod": "blp", "q": "A shareholder in a private company discovers the company has paid a loan to the managing director on favourable terms without proper disclosure. The shareholder wants to sue. Which is the best cause of action?", "options": ["A claim for breach of contract against the company", "A derivative claim on behalf of the company for breach of director's duties", "A personal claim against the shareholder for unfair prejudice", "A claim in the shareholder's own name for loss of company value"], "correct": 1, "explanation": "A breach of director's duties (such as self-dealing without disclosure) harms the company, not directly the shareholder. The shareholder's remedy is a derivative claim, bringing an action on behalf of the company. This is distinct from a personal injury claim to the shareholder."}, {"mod": "blp", "q": "A company buys goods from a supplier on standard terms that exclude liability for late delivery. The goods arrive 8 weeks late, causing the company loss. Can the company claim damages for late delivery?", "options": ["Yes, exclusion clauses are void in commercial contracts", "No, if the exclusion clause is fair and reasonable, it may be enforceable", "Yes, if the delay was caused by the supplier's negligence", "No, late delivery is a matter of contract, not tort"], "correct": 1, "explanation": "Even between businesses, exclusion clauses are subject to the test of reasonableness under the Unfair Contract Terms Act. An exclusion of liability for late delivery may be reasonable if it is clearly brought to the buyer's attention and the parties are of similar bargaining power. However, exclusions are not automatically valid."}, {"mod": "blp", "q": "A partnership agreement requires all partners to agree before the partnership takes on debt over \u00a350,000. One partner, without consulting the others, borrows \u00a3100,000 on behalf of the partnership. Are the other partners liable for this debt?", "options": ["No, the borrowing partner is solely liable as they acted without authority", "Yes, all partners are liable as partners have apparent authority to bind the firm", "No, unless the creditor can prove the partners authorized the debt", "Yes, but the other partners can sue the borrowing partner for breach of partnership agreement"], "correct": 1, "explanation": "Partners have apparent (or ostensible) authority to bind the partnership unless the third party knows or should know they have no such authority. Even if the partnership agreement restricts borrowing authority, the restriction is internal and does not bind third parties. All partners remain liable."}, {"mod": "blp", "q": "A company's articles of association state that the directors may not sell any asset worth more than \u00a3250,000 without shareholder approval. The directors sell a property worth \u00a3300,000. What is the legal consequence?", "options": ["The sale is void", "The sale is valid, but the directors are in breach of duty to the company", "The sale is voidable at the company's election", "The shareholder can rescind the sale personally"], "correct": 1, "explanation": "A breach of the company's internal rules (articles of association) by the directors constitutes a breach of fiduciary duty to the company. However, the transaction itself is not void or voidable; it is a breach for which the company can claim relief. The company may ratify the breach in general meeting."}, {"mod": "blp", "q": "A company receives a takeover offer. One director has a personal financial interest in the takeover company and stands to benefit from the acquisition. Can the interested director participate in the board's decision on the offer?", "options": ["Yes, if the director discloses the interest", "No, the interested director must abstain from all discussions and decisions", "Yes, if the other directors agree to allow participation", "It depends on whether the interest is material"], "correct": 1, "explanation": "A director with a material interest in a transaction must disclose it and typically should abstain from discussions and decision-making. Failure to do so is a breach of the duty to avoid conflicts of interest, even if disclosure is made."}, {"mod": "blp", "q": "A company is insolvent and has no prospect of recovery. The directors continue to trade, accumulating further debts. Can the liquidator pursue a claim against the directors for wrongful trading?", "options": ["No, directors have no personal liability for company insolvency", "Yes, if the directors knew or should have known of insolvency and continued trading", "No, the claim can only be brought by creditors, not the liquidator", "Yes, provided the company entered insolvency within 6 months of the trading"], "correct": 1, "explanation": "Under the Insolvency Act 1986, directors can be liable for wrongful trading if they knew or should have known the company could not avoid insolvency and continued trading anyway. The liquidator can pursue this claim. Directors must take steps to minimize loss once insolvency is apparent."}, {"mod": "wills", "q": "A testator signs a will. There are two witnesses present, but they are not both present at the same time - Witness A signs while Witness B is in another room, then Witness B signs later when Witness A has left. Is the will valid?", "options": ["Yes, as long as both witnesses sign the will", "No, both witnesses must be present at the same time and see the testator sign", "Yes, if the testator intended for both to be witnesses", "No, the will must be signed by three witnesses"], "correct": 1, "explanation": "Section 3 of the Wills Act 1837 requires that the testator's signature be made in the presence of two or more witnesses, and that the witnesses be present together when attesting. If they are not present simultaneously, the requirement is not satisfied, and the will may be invalid."}, {"mod": "wills", "q": "A testator executes a will leaving everything to her daughter. Two years later, the testator executes a second will leaving everything to her son, but it is not witnessed. The testator dies. Which document is valid?", "options": ["Only the first will is valid", "The second will is valid because it was signed by the testator", "Both are void because the second will was improperly executed", "The property passes under intestacy rules"], "correct": 0, "explanation": "A second will improperly executed cannot revoke a valid earlier will. The first properly executed will remains valid and will be admitted to probate. The second will is invalid and has no effect unless it can be validated under section 21 of the Wills Act (dispensing with formalities)."}, {"mod": "wills", "q": "A testator's will contains a clause: 'I give \u00a310,000 to my eldest son if he is married at my death.' The son is unmarried at the time of the testator's death. What happens to the \u00a310,000?", "options": ["The son receives the \u00a310,000 because the condition is uncertain", "The \u00a310,000 fails and passes to the testator's residue", "The \u00a310,000 is held in trust for the son until he marries", "The son can claim the \u00a310,000 if he marries within one year of death"], "correct": 1, "explanation": "A gift with a condition precedent (if he is married) fails if the condition is not satisfied at the testator's death. The gift is not made, and the property is part of the estate's residue. This is a condition precedent, not a condition subsequent."}, {"mod": "wills", "q": "A testator executes a will that leaves her entire estate to a charitable organization. Two weeks later, the testator is diagnosed with terminal cancer. Days before her death, she tells her daughter 'I've changed my mind about the charity - I want you to have everything.' She does not execute a new will. Can the daughter claim the estate?", "options": ["Yes, because the testator expressed a clear intention", "No, the will stands as executed and the charity inherits", "Yes, if the daughter can produce witnesses to the testator's statement", "No, but the charity may be estopped from enforcing the gift"], "correct": 1, "explanation": "Oral expressions of intention do not revoke a valid will. The testator's words alone, without a new properly executed will, cannot change the disposition of the estate. The will executed before the cancer diagnosis remains valid."}, {"mod": "wills", "q": "A testator's will is dated 1st January 2023. The testator executes another document dated 15th January 2023 that purports to alter certain provisions of the will. The document is signed by the testator but not witnessed. The testator dies in 2024. What is the effect of the second document?", "options": ["It is a valid codicil and takes effect to alter the will", "It is invalid; only a properly executed will or codicil can alter a valid will", "It is presumed to be a new will that revokes the original", "It can be used as evidence of the testator's intent, but does not legally change the will"], "correct": 1, "explanation": "A codicil must be executed with the same formalities as a will (signed by the testator and witnessed by two competent witnesses). An unwitnessed document cannot be a valid codicil. The original will stands unless a valid codicil or new will is executed."}, {"mod": "wills", "q": "A testator executes a will in which she leaves \u00a350,000 to her nephew. The testator later remarries. The testator does not execute a new will after the marriage. Does the will remain valid?", "options": ["Yes, marriage does not revoke a will unless there is a clause addressing it", "No, marriage automatically revokes any will executed before the marriage", "No, but the will can be validated if the spouse consents", "Yes, unless the spouse claims a share of the estate"], "correct": 1, "explanation": "Under section 18(1) of the Wills Act 1837, a will is revoked by the testator's marriage. This is an automatic revocation by operation of law. The testator would need to execute a new will after the marriage for their testamentary wishes to be recognized."}, {"mod": "wills", "q": "A testator executes a will naming her adult daughter as executor. The will also contains a clause leaving everything to the daughter. The daughter later discovers that the testator and the testator's son are not on good terms. The daughter is concerned about a claim of undue influence from the son. What should the daughter do?", "options": ["The daughter should refuse to act as executor to avoid conflict", "The daughter can act as executor and beneficiary; there is no automatic conflict", "The daughter should seek court authorization before acting", "The daughter must offer an indemnity to any beneficiary questioning the will"], "correct": 1, "explanation": "Acting as both executor and beneficiary is permissible and common. The beneficiary-executor has the same duties and responsibilities as any executor. A potential challenge on grounds of undue influence does not prevent the executor from acting; if a challenge is made, it is handled through probate proceedings."}, {"mod": "wills", "q": "A testator dies intestate. The testator is survived by a spouse and two adult children. How is the estate distributed under the intestacy rules?", "options": ["The spouse takes the entire estate", "The estate is divided equally between the spouse and the children", "The spouse receives \u00a3322,000 and personal property, and the remainder is divided between the children", "The spouse receives an absolute interest in half the estate, and half is divided between the children"], "correct": 2, "explanation": "Under the Administration of Estates Act 1925 (as amended), where a person dies intestate leaving a spouse and children, the spouse receives a statutory legacy (currently \u00a3322,000) plus personal chattels, and the remainder is divided equally between the children."}, {"mod": "trusts", "q": "A settlor transfers property to a trustee 'to hold on trust for my daughter for life, and then for my son in fee simple.' The daughter dies before the son. What is the legal position regarding the property?", "options": ["The property reverts to the settlor's estate", "The son immediately becomes the beneficial owner of the property", "The property remains in trust with the trustee holding it for the son", "The trustee is discharged and the property is sold"], "correct": 2, "explanation": "The trust continues after the daughter's death. The trustee continues to hold the property on trust for the son, who has a vested remainder interest. The son's interest is vested (certain to take effect), but enjoyment is postponed until the daughter's life interest ends."}, {"mod": "trusts", "q": "A trustee has power to pay income to a beneficiary 'as the trustee thinks fit.' The trustee receives a generous gift from the beneficiary in exchange for deciding to pay out significant income. Is this appropriate conduct by the trustee?", "options": ["Yes, the trustee can accept gifts from beneficiaries", "No, this is a breach of trust for secret profit and failure to exercise discretion impartially", "Yes, if the beneficiary consents to the arrangement", "No, but only if the gift is more valuable than the income paid"], "correct": 1, "explanation": "A trustee must not accept secret profits from their position and must not allow personal interests to conflict with their fiduciary duty. Accepting a gift conditioned on paying income breaches the trustee's duty of impartiality and constitutes a secret profit."}, {"mod": "trusts", "q": "A trust deed grants the trustee an absolute discretion to distribute income among a class of beneficiaries consisting of the settlor's grandchildren. The trustee refuses to consider one grandchild because the trustee dislikes the child's parent. Is this a valid exercise of discretion?", "options": ["Yes, the trustee's discretion is absolute and cannot be questioned", "No, the trustee has failed to consider all beneficiaries and must reconsider", "Yes, if the trustee documents the reason for exclusion", "No, but only if the excluded beneficiary can prove personal animus"], "correct": 1, "explanation": "Even with absolute discretion, a trustee must consider all potential beneficiaries. Refusing to consider a beneficiary because of personal dislike for a parent is an improper exercise of discretion. The trustee must approach the decision with an open mind and consider all beneficiaries."}, {"mod": "trusts", "q": "A trust document states 'The trustee may distribute income to the beneficiary if the beneficiary is in need.' The beneficiary has a substantial income from employment but modest savings. The beneficiary asks for a distribution to invest in a business venture. Must the trustee pay?", "options": ["Yes, the trustee must respect the beneficiary's wishes", "No, the trustee is not in need if they have income and savings", "Yes, if the business venture is a reasonable investment", "It depends on the trustee's assessment of the beneficiary's financial circumstances"], "correct": 3, "explanation": "A trustee exercising a discretionary power must make an individual assessment of the beneficiary's circumstances. 'Need' is a flexible concept depending on the beneficiary's lifestyle and responsibilities. The trustee should consider the beneficiary's overall financial position, not just income or savings in isolation."}, {"mod": "trusts", "q": "A trustee invests trust money in shares of a company in which the trustee is a shareholder and director. The investment performs well and generates profit for the trust. The trustee has not concealed the investment and the beneficiaries are aware of it. Can the beneficiaries claim a breach of trust?", "options": ["No, the investment was profitable and the beneficiaries are not harmed", "Yes, because the trustee had a conflict of interest, regardless of profitability", "No, because the beneficiaries had knowledge of the investment", "Yes, but only if the trustee is shown to have acted dishonestly"], "correct": 1, "explanation": "A trustee must not place themselves in a position where their personal interests conflict with their duty to the trust. This is a strict liability rule; the trustee is in breach even if the investment was profitable and even if the beneficiaries consented. The conflict of interest itself is the breach."}, {"mod": "trusts", "q": "A settlement creates a trust of land. The trustee and all the beneficiaries agree that the trust should be discharged and the property distributed according to their wishes. Can they proceed without court approval?", "options": ["No, trusts can only be discharged by the court", "Yes, if all beneficiaries are adult and agree under the rule in Saunders v Vautier", "Yes, but the trustee must apply for court directions", "No, unless there is a clause in the trust deed allowing discharge"], "correct": 1, "explanation": "Under the rule in Saunders v Vautier, if all beneficiaries are of full age and capacity, and they are collectively entitled to the entire beneficial interest, they can require the trustee to discharge the trust and distribute the property as they direct."}, {"mod": "trusts", "q": "A trustee holds property on trust for two beneficiaries. One beneficiary assigns their interest to a third party without informing the trustee. The trustee continues to pay income to the original beneficiary. What is the legal position?", "options": ["The assignment is void because beneficiaries cannot assign equitable interests", "The assignment is valid; the third party has rights over the beneficiary's share", "The trustee is liable to the third party for not recognizing the assignment", "The assignment is valid only if the trustee consents in writing"], "correct": 1, "explanation": "A beneficiary can assign their equitable interest to a third party. The assignment does not require the trustee's consent, but notice should be given to the trustee so that the trustee can pay future distributions to the correct party. The third party's rights depend on proper notice to the trustee."}, {"mod": "trusts", "q": "A trustee makes an investment that, while not prohibited by the trust deed, is highly speculative and results in a significant loss of trust capital. The beneficiaries claim breach of trust. Can they recover the loss?", "options": ["No, as long as the investment was not prohibited", "Yes, if the trustee did not exercise reasonable care in selecting the investment", "No, beneficiaries assume investment risk", "Yes, the trustee is strictly liable for investment losses"], "correct": 1, "explanation": "A trustee must exercise reasonable care in making investments, even if the trust deed grants wide investment powers. A highly speculative investment may breach the trustee's duty of care. The test is whether a reasonable trustee would have made that investment, not whether the investment was expressly permitted."}, {"mod": "crl", "q": "A defendant is charged with assault. The defendant claims they were acting in self-defence. The defendant does not have to prove the defence, but the burden shifts to the defence once evidence of self-defence is raised. Is this correct?", "options": ["Yes, self-defence is a defence where the burden of proof shifts to the defence", "No, the prosecution must disprove self-defence beyond reasonable doubt", "Yes, but only if the defendant provides significant evidence of self-defence", "No, self-defence must be proven by the defence on the balance of probabilities"], "correct": 1, "explanation": "The burden of proof in criminal cases is always on the prosecution to prove guilt beyond reasonable doubt. Self-defence is a defence to be considered by the jury, but the prosecution must disprove it beyond reasonable doubt once evidence of it is raised. The burden does not shift to the defence."}, {"mod": "crl", "q": "A defendant is charged with theft. The defendant admits taking the goods but claims they believed they had a legal right to them. The defendant did not attempt to return the goods or pay for them. Can the defendant be convicted of theft?", "options": ["No, the defendant's belief in a right to take absolves them of guilt", "Yes, if the defendant's belief was unreasonable", "Yes, unless the defendant's belief was honest and reasonable", "No, theft requires proof that the defendant intended to permanently deprive"], "correct": 2, "explanation": "Under section 2(1)(a) of the Theft Act 1968, theft is excluded if the defendant believes they have a legal right. However, this defence applies only if the belief was honest. An honest but unreasonable belief suffices, but here the defendant took no steps to assert the right, suggesting the belief was not genuinely held."}, {"mod": "crl", "q": "A defendant intends to kill another person but strikes them with a stick intending only to cause serious bodily harm. The person dies. With what crime can the defendant be charged?", "options": ["Only manslaughter, because the defendant did not intend death", "Murder, if the defendant intended the blow to cause serious bodily harm", "Assault causing actual bodily harm", "Involuntary manslaughter only"], "correct": 1, "explanation": "Under the law of murder, a person can be guilty if they intended to cause serious bodily harm and the victim dies. The defendant does not need to intend death; intent to cause grievous bodily harm suffices. This is known as 'malice aforethought.'"}, {"mod": "crl", "q": "A defendant is charged with burglary of a dwelling house. The defendant entered a building by opening a window and then stole a laptop computer. What is the essential element the prosecution must prove?", "options": ["That the defendant entered the building with intent to steal", "That the defendant actually stole the computer", "That the defendant used force to enter", "That the defendant intended to commit a crime inside the building at the time of entry"], "correct": 3, "explanation": "Burglary of a dwelling requires proof that the defendant entered the building as a trespasser with intent to commit theft, or entered and then stole or attempted to steal. The key element is the intention at the time of entry to commit theft (or another specified crime)."}, {"mod": "crl", "q": "A defendant is charged with assault causing actual bodily harm. The prosecution must prove which mens rea (mental element)?", "options": ["Intention to cause harm", "Recklessness as to whether harm is caused", "Intention to commit the assault or recklessness as to the harm", "Negligence in carrying out the assault"], "correct": 2, "explanation": "For assault causing actual bodily harm, the mens rea is intention to commit the assault or subjective recklessness as to whether harm is caused. This is a lower threshold than requiring intention to cause harm. Recklessness (aware of the risk and taking it) suffices."}, {"mod": "crl", "q": "A shopkeeper discovers a customer placing items in a bag without paying. The customer has not left the shop yet. Can the customer be charged with theft?", "options": ["No, theft is only committed upon leaving the shop", "Yes, once the customer intends to permanently deprive the owner of the goods", "No, the customer is only attempting theft while still in the shop", "Yes, the customer must be arrested immediately to complete the crime"], "correct": 1, "explanation": "Theft is committed when the defendant dishonestly appropriates property with the intention of permanently depriving the owner of it. The crime is complete once the defendant intends permanent deprivation, not necessarily when they leave the shop. If the customer intends not to pay, theft is committed."}, {"mod": "crl", "q": "A defendant is charged with driving with excess alcohol. The defendant's breath test shows 40 micrograms of alcohol per 100 millilitres of breath, and the legal limit is 35. The defendant claims they consumed alcohol after driving but before the test. Is this a valid defence?", "options": ["Yes, the defence of post-driving consumption is available if the defendant can show they drank after driving", "No, the legal limit applies at the time of driving, and the test proves it was exceeded", "Yes, if the defendant can prove they were below the limit while driving", "No, consumption after driving is always irrelevant to the charge"], "correct": 2, "explanation": "The Road Traffic Act provides a specific defence: the defendant can be acquitted if they prove they consumed alcohol after driving and before the test, and they were not impaired when driving. This requires evidence that post-driving consumption accounts for the excess."}, {"mod": "crl", "q": "A defendant is charged with battery of a police officer acting in the execution of their duty. The defendant claims the officer was not acting in the execution of their duty because the arrest was unlawful. Is the unlawfulness of the arrest a defence to battery?", "options": ["Yes, an unlawful arrest means the officer was not acting in the execution of duty", "No, the defendant cannot resist an arrest regardless of whether it is lawful", "Yes, but only if the defendant can prove the arrest was manifestly unlawful", "No, battery on a police officer is a strict liability offence"], "correct": 1, "explanation": "A person has the right to resist arrest using reasonable force if the arrest is unlawful. However, if the arrest itself is lawful, resisting with force is battery. The key is whether the officer is acting in the execution of duty at the time; an unlawful act means they are not."}, {"mod": "crp", "q": "A defendant is arrested on suspicion of assault. At the police station, the custody officer informs the defendant of their right to free legal advice. The defendant says 'I don't want a solicitor.' Can the defendant be questioned without a solicitor present?", "options": ["Yes, the defendant has waived the right to legal advice", "No, the defendant must have a solicitor present regardless of their wishes", "Yes, but only if the detention is for a minor offence", "No, unless the defendant's request is clear and informed"], "correct": 3, "explanation": "A defendant can waive the right to legal advice, but the waiver must be clear, informed, and documented. The police should ensure the defendant understands the right and the consequences of waiving it. A casual statement may not constitute a valid waiver."}, {"mod": "crp", "q": "During a police interview, a defendant makes admissions about the alleged crime. The interview is conducted without a solicitor present, though the defendant had declined legal advice. Later, the defendant is charged and claims the admissions should be excluded as evidence. Can the judge exclude them?", "options": ["No, the admissions are admissible because the defendant waived legal advice", "Yes, if the judge considers that the admissions are unreliable due to lack of legal advice", "No, once made, admissions cannot be excluded on the basis of procedure", "Yes, admissions made without legal advice are automatically excluded"], "correct": 1, "explanation": "Even where legal advice has been waived, a court can exclude admissions under section 78 of the Police and Criminal Evidence Act 1984 if their admission would have such an adverse effect on the fairness of the proceedings that it ought to be excluded. Lack of legal advice is a factor, but not determinative."}, {"mod": "crp", "q": "A defendant is remanded in custody pending trial. The defendant's solicitor applies for bail. The prosecution argues that the defendant is a flight risk. What is the defendant's burden regarding bail?", "options": ["The defendant must prove they are not a flight risk", "The prosecution must prove beyond reasonable doubt that the defendant is a flight risk", "The defendant must show substantial grounds for believing they will not abscond", "It is a balanced assessment by the magistrate with no fixed burden"], "correct": 3, "explanation": "Bail decisions involve a balancing of risks. The prosecution must show 'substantial grounds' for believing the defendant will abscond, fail to surrender, or commit further offences. The defendant may then present evidence addressing those concerns. It is not a strict burden of proof on either party."}, {"mod": "crp", "q": "A defendant is charged with a triable either way offence. The magistrate's court receives evidence about the seriousness of the case and decides that the case is too serious for the magistrate's court. The defendant objects to trial in the Crown Court. Can the defendant insist on trial in the magistrate's court?", "options": ["Yes, the defendant has the right to choose the forum", "No, if the magistrate considers the case too serious, it must go to the Crown Court", "Yes, the defendant can request a summary trial even if the magistrate declines", "No, but the defendant can appeal the decision to the Crown Court"], "correct": 3, "explanation": "For triable either way offences, the defendant has the right to elect trial in the Crown Court. However, the magistrate can decline to accept summary jurisdiction if the case is too serious. The decision reflects sentencing powers and the seriousness of the offence."}, {"mod": "crp", "q": "A police officer arrests a defendant at home without a warrant. The defendant was not in the process of committing an offence. Is the arrest lawful?", "options": ["Yes, police can arrest anyone suspected of a crime", "No, a warrant is required to arrest a person in their own home", "Yes, if the officer has reasonable grounds to believe the defendant has committed a crime", "No, an arrest at home requires higher justification than arrest in public"], "correct": 2, "explanation": "Police can arrest without a warrant if they have reasonable grounds to believe a person has committed an indictable offence or is about to commit one. The location (home) does not prevent arrest, but it may require greater justification. A warrant is preferred but not always required."}, {"mod": "crp", "q": "A defendant is charged with assault. The victim is unwilling to give evidence in court. The prosecution seeks to adduce a statement made by the victim to the police as evidence instead. What test applies to the admissibility of this hearsay?", "options": ["The statement is automatically inadmissible as hearsay", "The statement is admissible if the prosecution can show the victim is unavailable and the statement is reliable", "The statement is admissible if the defendant's solicitor had notice of it", "The statement is admissible only if the victim testifies"], "correct": 1, "explanation": "Under the Criminal Justice Act 2003, hearsay (a statement made out of court offered to prove its contents) can be admitted in certain circumstances, including where the witness is unavailable. The court must consider whether to admit it in the interests of justice, taking into account its reliability."}, {"mod": "crp", "q": "A defendant pleads guilty to an offence. Before sentencing, the presentence report recommends a community sentence. The judge imposes a custodial sentence instead. Can the defendant appeal?", "options": ["No, once a guilty plea is entered, the defendant cannot appeal", "Yes, the defendant can appeal against sentence but not conviction", "No, the judge's sentencing decision is not appealable", "Yes, the defendant can appeal if the sentence is manifestly excessive"], "correct": 3, "explanation": "A defendant can appeal against sentence after a guilty plea. The sentence is appealable if it is manifestly excessive or if the sentencing judge made an error in law. The defendant must show the sentence is outside the proper sentencing range for the offence."}, {"mod": "crp", "q": "A defendant is tried and acquitted of a serious crime. Three years later, new evidence of the defendant's guilt emerges. Can the defendant be retried for the same offence?", "options": ["Yes, the statute of limitations does not apply to serious crimes", "No, double jeopardy principles prevent retrial after acquittal", "Yes, in exceptional circumstances, if the evidence is compelling", "No, but the defendant can be prosecuted if they make admissions"], "correct": 2, "explanation": "The Criminal Justice Act 2003 abolished the full double jeopardy protection. Now, a defendant can be retried for a serious offence after acquittal if there is new evidence of guilt that is sufficiently compelling, and retrial is in the interests of justice."}, {"mod": "crp", "q": "During cross-examination, the defence solicitor asks a prosecution witness about the witness's previous conviction. The witness is offended and refuses to answer. Can the judge compel the witness to answer?", "options": ["No, previous convictions are irrelevant and inadmissible", "Yes, character evidence is admissible to attack credibility", "Yes, but only if the conviction relates to truthfulness", "It depends on the judge's discretion and the relevance of the conviction"], "correct": 2, "explanation": "Under the Criminal Justice Act 2003, a witness can be questioned about previous convictions if they relate to the witness's credibility (truthfulness). The court has discretion to refuse questioning if it would be unfairly prejudicial, but generally, questions about relevant convictions must be answered."}, {"mod": "crp", "q": "A defendant is questioned by police about a serious crime. The defendant remains silent. At trial, the prosecutor mentions the defendant's silence as evidence of guilt. Is this permissible?", "options": ["Yes, silence can be used as evidence of consciousness of guilt", "No, the defendant's right to silence is absolute and cannot be mentioned", "Yes, but only if the defendant had been advised of the consequences", "No, unless the defendant fails to mention a fact later relied upon in defence"], "correct": 3, "explanation": "The right to silence is protected, and generally, silence in police questioning cannot be used as evidence of guilt. However, under section 34 of the Criminal Justice and Public Order Act 1994, if the defendant fails to mention a fact in police questioning that is later relied upon in defence, the court can draw inferences."}, {"mod": "ls", "q": "A solicitor receives a large cash payment from a client for legal services. The client refuses to provide identification or confirm the source of the funds. What should the solicitor do?", "options": ["Accept the payment; client confidentiality prevents inquiry", "Decline the payment and consider making a suspicious activity report (SAR) to the FCA", "Accept the payment but report it to the Law Society", "Request identification and take steps to verify the source; consider making a SAR if suspicious"], "correct": 3, "explanation": "Solicitors have anti-money laundering obligations under the Money Laundering Regulations. They must verify client identity, understand the source of funds, and make suspicious activity reports where appropriate. Failure to do so can result in criminal liability."}, {"mod": "ls", "q": "A solicitor acts for both a landlord and a tenant in a property dispute. The interests are beginning to conflict. Can the solicitor continue to act for both parties?", "options": ["Yes, if both parties consent to the dual representation", "No, a solicitor cannot act for parties with conflicting interests", "Yes, as long as the solicitor remains impartial", "It depends on the stage of proceedings and the nature of the conflict"], "correct": 3, "explanation": "A solicitor can act for multiple parties with conflicting interests in limited circumstances, such as in property transactions where the interests are shared at the outset. However, if conflicts arise, the solicitor must consider withdrawing from one or both representations."}, {"mod": "ls", "q": "A client sues their former solicitor for negligence in conveyancing. The client claims the solicitor failed to identify a title defect. The client now wishes to recover the cost of rectifying the defect and the diminution in property value. What must the client prove?", "options": ["Breach of duty only", "Breach of duty and causation", "Breach of duty, causation, and quantifiable loss", "Breach of duty and that the solicitor intended to cause harm"], "correct": 2, "explanation": "In a negligence claim against a solicitor, the client must prove: (1) the solicitor owed a duty of care, (2) breach of that duty, (3) causation (the breach caused loss), and (4) quantifiable damage. The client must prove all elements, including that the loss flowed from the breach."}, {"mod": "ls", "q": "A solicitor learns that their client intends to use legal advice to facilitate money laundering. The client has not yet done so. What is the solicitor's obligation?", "options": ["The solicitor may continue advising due to client privilege", "The solicitor must report the client to the police under the Proceeds of Crime Act", "The solicitor must report to the solicitor's compliance officer for anti-money laundering", "The solicitor should advise the client that the conduct is illegal and cease acting"], "correct": 2, "explanation": "Under the Proceeds of Crime Act 2002, if a solicitor knows or suspects that money laundering is occurring or will occur, the solicitor must report it to the Financial Conduct Authority or a nominated officer. Failure to report can result in criminal liability."}, {"mod": "ls", "q": "A client instructs a solicitor to draft a will. The solicitor suspects the client may lack testamentary capacity due to age or cognitive issues. What should the solicitor do?", "options": ["Proceed with drafting; capacity assessment is a medical matter", "Refuse to act without obtaining medical evidence of capacity", "Assess the client's understanding and, if concerned, decline to act or seek medical advice", "Draft the will with a clause that acknowledges potential capacity issues"], "correct": 2, "explanation": "Solicitors have a professional duty to ensure the client has capacity to instruct them. If there are concerns about capacity, the solicitor should assess the client's understanding and, if still concerned, may refuse to act or seek medical assessment. Proceeding without inquiry may constitute professional negligence."}, {"mod": "ls", "q": "A solicitor's file is served with a disclosure notice requiring the solicitor to produce documents relating to a client. The documents are covered by legal professional privilege. Should the solicitor produce them?", "options": ["Yes, disclosure notices must be complied with", "No, privilege protects the documents from disclosure unless the client waives it", "Yes, but only if the judge orders it", "No, unless the solicitor is a party to the dispute"], "correct": 1, "explanation": "Legal professional privilege protects communications between solicitor and client relating to legal advice or proceedings from disclosure. A disclosure notice does not override privilege. The solicitor should assert privilege and not produce the documents unless the client waives privilege."}, {"mod": "ls", "q": "A solicitor gives oral legal advice to a client over the telephone. The client later disputes the advice and claims the solicitor was negligent. The solicitor has no notes of the conversation. Is the solicitor at risk of liability?", "options": ["No, oral advice is not actionable", "Yes, but the lack of notes does not affect liability", "No, if the advice was given in good faith", "Yes, and the lack of notes may be adverse to the solicitor's credibility"], "correct": 3, "explanation": "Oral advice can give rise to a duty of care and liability for negligence. While not having notes does not automatically mean advice was negligent, it may harm the solicitor's credibility in defending a claim. Good practice requires contemporaneous notes of advice given."}, {"mod": "ls", "q": "A solicitor receives a referral fee from another firm for referring a client to that firm. The solicitor has not disclosed the arrangement to the client. Is this conduct permissible?", "options": ["Yes, referral fees are standard business practice", "No, referral fees must be disclosed to the client before referring", "Yes, as long as the fee does not affect the advice given", "No, solicitors cannot accept referral fees from other solicitors"], "correct": 1, "explanation": "Solicitors must disclose any financial interest in a referral, including referral fees, to the client. Failing to disclose a conflict of interest, even if inadvertent, breaches professional conduct rules and may constitute negligence."}, {"mod": "dr", "q": "A claimant serves a claim form on a defendant through the court system. The defendant's solicitor acknowledges receipt but says they need time to take instructions. Can the defendant file a defence immediately?", "options": ["No, the defendant must wait for the court to extend the time", "No, but the defendant can file a notice of intention to defend", "Yes, the defendant can file a defence at any time", "No, the defendant must obtain an extension from the claimant's solicitor"], "correct": 1, "explanation": "Upon service of a claim form, a defendant has a time limit to file a defence (usually 14 days or 28 days depending on service). A notice of intention to defend can be filed to extend this time. The defendant cannot simply ignore the deadline."}, {"mod": "dr", "q": "A claimant brings an action for contract breach. The defendant admits the breach but claims the claimant is not entitled to damages because the claimant was in breach of the same contract. Is this a valid defence?", "options": ["No, the defendant's breach is not excused by the claimant's breach", "Yes, if both parties are in breach, neither can claim damages", "Yes, as a counterclaim, but it does not automatically prevent the claimant from recovering", "No, unless the defendant can prove the claimant's breach was material"], "correct": 2,
